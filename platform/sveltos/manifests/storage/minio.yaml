# Single-node MinIO — S3 backend for Loki (replaces Ceph RGW).
#
# Runs in the `monitoring` namespace so it shares the `loki-minio` Secret with
# Loki (delivered by Flux from secrets/infrastructure/minio/). Backed by a
# Longhorn PV. One replica — durability comes from Longhorn's replicas across
# the SSDs, not from MinIO erasure coding.
#
# The `loki-minio` Secret carries AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY;
# they double as MinIO's root creds and as Loki's S3 creds.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: monitoring
  labels: {app: minio}
spec:
  replicas: 1
  strategy: {type: Recreate}   # RWO volume — never two pods at once
  selector:
    matchLabels: {app: minio}
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: {secretKeyRef: {name: loki-minio, key: AWS_ACCESS_KEY_ID}}
            - name: MINIO_ROOT_PASSWORD
              valueFrom: {secretKeyRef: {name: loki-minio, key: AWS_SECRET_ACCESS_KEY}}
          ports:
            - {containerPort: 9000, name: s3}
            - {containerPort: 9001, name: console}
          volumeMounts:
            - {name: data, mountPath: /data}
          readinessProbe:
            httpGet: {path: /minio/health/ready, port: 9000}
            initialDelaySeconds: 5
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {memory: 1Gi}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: minio-data}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: monitoring
spec:
  selector: {app: minio}
  ports:
    - {name: s3, port: 9000, targetPort: 9000}
    - {name: console, port: 9001, targetPort: 9001}
---
# Create Loki's buckets once MinIO is up. Idempotent (`mc mb -p`).
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-make-buckets
  namespace: monitoring
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-04-08T15-39-49Z
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              until mc alias set m http://minio:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"; do
                echo "waiting for minio..."; sleep 3
              done
              mc mb -p m/loki-chunks m/loki-ruler m/loki-admin
              mc ls m
          envFrom:
            - secretRef: {name: loki-minio}
