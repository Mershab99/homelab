# family — k3k shared virtual cluster on arrakis. Home of Home Assistant
# (migrated off Loft vcluster). Workloads land on the general pool.
#
# Registered with the hub Sveltos from its kubeconfig Secret as SveltosCluster
# `family` in ns `vclusters` — see docs/runbooks/registering-a-k3k-vcluster.md.
apiVersion: v1
kind: Namespace
metadata:
  name: k3k-family
---
apiVersion: k3k.io/v1beta1
kind: Cluster
metadata:
  name: family
  namespace: k3k-family
spec:
  mode: shared
  servers: 1
  # ponytail: pinned k3s tag — bump to match arrakis/k3k support once verified.
  version: v1.31.5-k3s1
  nodeSelector:
    node.mershab.com/pool: general
  tlsSANs:
    - k3k-family.mershab.com
  serverArgs:
    - --kube-apiserver-arg=oidc-issuer-url=https://auth.mershab.com
    - --kube-apiserver-arg=oidc-client-id=kubernetes
    - --kube-apiserver-arg=oidc-username-claim=email
    - --kube-apiserver-arg=oidc-username-prefix=oidc:
    - --kube-apiserver-arg=oidc-groups-claim=groups
    - --kube-apiserver-arg=oidc-groups-prefix=oidc:
  # expose: see the registration runbook (schema varies by k3k version).
