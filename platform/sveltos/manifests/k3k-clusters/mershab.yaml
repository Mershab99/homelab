# mershab — k3k shared virtual cluster on arrakis. Home of the mershab.com
# website (nginx). Workloads land on the general pool (never the GPU VMs).
#
# API reachability: mgmt (192.168.2.70) and the arrakis KubeVirt VMs share the
# LAN. Register this vcluster with the hub Sveltos from its generated kubeconfig
# Secret — see docs/runbooks/registering-a-k3k-vcluster.md (the one runtime step;
# k3k can't self-register the way Loft's bundled applier did).
apiVersion: v1
kind: Namespace
metadata:
  name: k3k-mershab
---
apiVersion: k3k.io/v1beta1
kind: Cluster
metadata:
  name: mershab
  namespace: k3k-mershab
spec:
  mode: shared
  servers: 1
  # ponytail: pinned k3s tag — bump to match arrakis/k3k support once verified.
  version: v1.31.5-k3s1
  # Keep vcluster pods on the autoscaling general pool, off the fixed GPU VMs.
  nodeSelector:
    node.mershab.com/pool: general
  tlsSANs:
    - k3k-mershab.mershab.com
  # OIDC federation to Dex (same as the tenant apiserver) via k3s kube-apiserver args.
  serverArgs:
    - --kube-apiserver-arg=oidc-issuer-url=https://auth.mershab.com
    - --kube-apiserver-arg=oidc-client-id=kubernetes
    - --kube-apiserver-arg=oidc-username-claim=email
    - --kube-apiserver-arg=oidc-username-prefix=oidc:
    - --kube-apiserver-arg=oidc-groups-claim=groups
    - --kube-apiserver-arg=oidc-groups-prefix=oidc:
  # expose: make the API server reachable from the hub for Sveltos registration.
  # ponytail: exact expose sub-schema (loadbalancer/nodeport) varies by k3k
  # version — wire per the registration runbook rather than guess it here.
