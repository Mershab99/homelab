# HTTPRoutes for every homelab service (*.mershab.com) on the shared
# Gateway. All routes live in the traefik ns; cross-ns backends are unlocked by
# a ReferenceGrant in each app ns. Grafana authenticates against Dex itself.
#
# NOTE: longhorn, hubble and the Traefik dashboard are served UNAUTHENTICATED
# (oauth2-proxy forwardAuth was removed). They're internal-only
# (*.mershab.com), but add auth back if that's not acceptable.
#
# ponytail: service ports for hubble/longhorn are the chart defaults —
# verify with `kubectl get svc -A` after deploy if a route 404s.

# --- dex (OIDC issuer, auth.mershab.com) ---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: dex, namespace: traefik}
spec:
  parentRefs: [{name: shared, namespace: traefik}]
  hostnames: ["auth.mershab.com"]
  rules:
    - backendRefs: [{name: dex, namespace: dex, port: 5556}]
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata: {name: allow-traefik-httproutes, namespace: dex}
spec:
  from: [{group: gateway.networking.k8s.io, kind: HTTPRoute, namespace: traefik}]
  to: [{group: "", kind: Service}]
---
# --- grafana (native OIDC) ---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: grafana, namespace: traefik}
spec:
  parentRefs: [{name: shared, namespace: traefik}]
  hostnames: ["grafana.mershab.com"]
  rules:
    - backendRefs: [{name: grafana-service, namespace: monitoring, port: 3000}]
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata: {name: allow-traefik-httproutes, namespace: monitoring}
spec:
  from: [{group: gateway.networking.k8s.io, kind: HTTPRoute, namespace: traefik}]
  to: [{group: "", kind: Service}]
---
# --- longhorn UI (unauthenticated, internal-only) ---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: longhorn, namespace: traefik}
spec:
  parentRefs: [{name: shared, namespace: traefik}]
  hostnames: ["longhorn.mershab.com"]
  rules:
    - backendRefs: [{name: longhorn-frontend, namespace: longhorn-system, port: 80}]
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata: {name: allow-traefik-httproutes, namespace: longhorn-system}
spec:
  from: [{group: gateway.networking.k8s.io, kind: HTTPRoute, namespace: traefik}]
  to: [{group: "", kind: Service}]
---
# --- hubble UI (unauthenticated, internal-only) ---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: hubble, namespace: traefik}
spec:
  parentRefs: [{name: shared, namespace: traefik}]
  hostnames: ["hubble.mershab.com"]
  rules:
    - backendRefs: [{name: hubble-ui, namespace: kube-system, port: 80}]
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata: {name: allow-traefik-httproutes, namespace: kube-system}
spec:
  from: [{group: gateway.networking.k8s.io, kind: HTTPRoute, namespace: traefik}]
  to: [{group: "", kind: Service}]
---
# --- mershab.com (public website; nginx in the mershab k3k vCluster on arrakis) ---
# The backend lives on a DIFFERENT cluster (arrakis), reachable over the LAN via
# the website Service's LoadBalancer IP. We model it as a selectorless Service +
# a manual EndpointSlice pointing at that LAN IP. No auth (public site).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: mershab-web, namespace: traefik}
spec:
  parentRefs: [{name: shared, namespace: traefik}]
  hostnames: ["mershab.com"]
  rules:
    - backendRefs: [{name: arrakis-website, port: 80}]
---
apiVersion: v1
kind: Service
metadata: {name: arrakis-website, namespace: traefik}
spec:
  ports:
    - {name: http, port: 80, targetPort: 80}
  # selectorless — endpoints supplied manually below (backend is off-cluster)
---
# TODO(arrakis): re-enable this EndpointSlice once the mershab vCluster's
# website Service has a LAN LoadBalancer IP — it's the EXTERNAL-IP of
#   kubectl --kubeconfig=mershab.kubeconfig -n website get svc website
# The 0.0.0.0 placeholder is REJECTED by the apiserver, which fails the whole
# ingress-external Resources feature and (via dependsOn) deadlocks auth-stack →
# capi-stack → tenant-arrakis. Until then mershab.com 503s (route has no
# endpoints), which is fine pre-launch.
#
# apiVersion: discovery.k8s.io/v1
# kind: EndpointSlice
# metadata:
#   name: arrakis-website
#   namespace: traefik
#   labels:
#     kubernetes.io/service-name: arrakis-website
# addressType: IPv4
# ports:
#   - {name: http, port: 80}
# endpoints:
#   - addresses:
#       - "<LAN LB IP of website svc>"
---
# --- Traefik dashboard (unauthenticated, internal-only) ---
# The internal `api@internal` service can't be an HTTPRoute backend, and an
# IngressRoute is invisible to external-dns. So we expose the insecure API on
# the `traefik` entrypoint (:8080, ClusterIP-only — never on the chisel LB) via
# a selectorful Service, then front it with an HTTPRoute so external-dns
# publishes traefik.mershab.com. Same ns as the Gateway → no ReferenceGrant.
apiVersion: v1
kind: Service
metadata: {name: traefik-dashboard, namespace: traefik}
spec:
  selector:
    app.kubernetes.io/instance: traefik-traefik
    app.kubernetes.io/name: traefik
  ports:
    - {name: dashboard, port: 8080, targetPort: traefik}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: traefik-dashboard, namespace: traefik}
spec:
  parentRefs: [{name: shared, namespace: traefik}]
  hostnames: ["traefik.mershab.com"]
  rules:
    - backendRefs: [{name: traefik-dashboard, port: 8080}]
