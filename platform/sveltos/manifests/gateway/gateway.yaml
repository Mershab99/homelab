# Shared internal Gateway — Traefik Gateway API. One VIP (chisel-tunnelled),
# one wildcard listener; every homelab service attaches an HTTPRoute for
# <svc>.mershab.com. External reachability is via chisel-operator
# (Traefik's Service has the chisel loadBalancerClass — see 02-ingress-external).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller
---
# Wildcard TLS for *.mershab.com via letsencrypt-prod (Cloudflare DNS-01,
# already configured in 01-tls-stack). DNS-01 is required for wildcards.
# (Flattened from *.homelab.mershab.com 2026-07-15; secret name kept to
# avoid churning listener refs — cert-manager reissues in place.)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-wildcard
  namespace: traefik
spec:
  secretName: homelab-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.mershab.com"
  dnsNames:
    - "*.mershab.com"
---
# Apex TLS for mershab.com (the public website). The homelab wildcard does NOT
# cover the apex, so it needs its own cert. letsencrypt-prod DNS-01 already lists
# bare mershab.com in its dnsZones (01-tls-stack clusterissuers).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mershab-apex
  namespace: traefik
spec:
  secretName: mershab-apex-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: mershab.com
  dnsNames:
    - mershab.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared
  namespace: traefik
spec:
  gatewayClassName: traefik
  listeners:
    # Listener ports are traefik's ENTRYPOINT bind port (websecure = :8443),
    # not the Service's exposed 443 — traefik's gateway provider matches
    # listener.port against the entrypoint address and rejects the listener
    # ("PortUnavailable ... no matching entryPoint") otherwise. Clients still
    # hit 443: the Service maps 443 -> 8443.
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: "*.mershab.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: homelab-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All        # routes live in the traefik ns; backends cross-ns via ReferenceGrant
    # Apex listener for the public website (nginx in the mershab k3k vCluster).
    - name: apex
      protocol: HTTPS
      port: 8443
      hostname: mershab.com
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: mershab-apex-tls
      allowedRoutes:
        namespaces:
          from: All
    # (tenant apiserver is NOT routed here — its k0smotron Service is a
    # chisel-class LoadBalancer with its own VPS tunnel on :6443; see
    # tenants/arrakis/infra/cluster.yaml spec.patches)
