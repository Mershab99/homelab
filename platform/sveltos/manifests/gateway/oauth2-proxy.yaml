# oauth2-proxy — OIDC client to Dex, used by Traefik forwardAuth to gate the
# services that have NO native OIDC (longhorn, hubble, traefik dashboard).
# Grafana + Headlamp do their own Dex OIDC and are NOT fronted by this.
#
# ponytail: oauth2-proxy + Traefik forwardAuth redirect flow is fiddly — verify
# the sign-in redirect end to end after deploy. Creds come from the SOPS secret
# `oauth2-proxy` (secrets/infrastructure/oauth2-proxy/).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: traefik
  labels: {app: oauth2-proxy}
spec:
  replicas: 1
  selector: {matchLabels: {app: oauth2-proxy}}
  template:
    metadata:
      labels: {app: oauth2-proxy}
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.mershab.com
            - --client-id=oauth2-proxy
            - --email-domain=*
            - --upstream=static://202
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --cookie-secure=true
            - --cookie-domain=.homelab.mershab.com
            - --whitelist-domain=.homelab.mershab.com
            - --redirect-url=https://oauth2.homelab.mershab.com/oauth2/callback
          envFrom:
            - secretRef: {name: oauth2-proxy}   # OAUTH2_PROXY_CLIENT_SECRET + OAUTH2_PROXY_COOKIE_SECRET
          ports: [{containerPort: 4180}]
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: traefik
spec:
  selector: {app: oauth2-proxy}
  ports: [{name: http, port: 4180, targetPort: 4180}]
---
# Traefik forwardAuth middleware → oauth2-proxy. Apps' HTTPRoutes reference this
# via extensionRef (same ns = traefik, so no ReferenceGrant for the middleware).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-forwardauth
  namespace: traefik
spec:
  forwardAuth:
    address: http://oauth2-proxy.traefik.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization
