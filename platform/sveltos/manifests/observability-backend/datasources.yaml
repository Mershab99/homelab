# Grafana datasources — managed by grafana-operator's GrafanaDatasource CR.
# The `dashboards: grafana` label on the Grafana CR + matching
# instanceSelector here binds the datasource to the right Grafana instance.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Loki
    type: loki
    access: proxy
    url: http://loki-gateway.monitoring.svc:3100
    isDefault: true
    editable: false
