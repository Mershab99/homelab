# ObjectBucketClaim — Rook/Ceph creates an S3 bucket + access keys for
# Loki. The keys land in a Secret named `loki-bucket` in the monitoring
# namespace; Loki's Helm values reference it via envFrom.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: loki-bucket
  namespace: monitoring
spec:
  generateBucketName: loki
  storageClassName: ceph-bucket
