# oidc-rbac — ClusterRoleBindings that map Dex groups to Kubernetes RBAC.
# Applied to vClusters ONLY — the only apiservers that federate to Dex. arrakis
# (persona=platform) HOSTS Dex, so its apiserver does NOT federate (cert-auth
# only); the bare-metal apiserver has no OIDC either.
#
# Group taxonomy:
#   oidc:platform-admins — full cluster-admin
#   oidc:viewers         — read-only across all resources
#
# Selector: persona=ai (vClusters).
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: oidc-rbac
spec:
  clusterSelector:
    matchLabels:
      persona: ai
  policyRefs:
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/oidc-rbac
