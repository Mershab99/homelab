# oidc-rbac — ClusterRoleBindings that map Dex groups to Kubernetes RBAC.
# Applied to every cluster whose apiserver federates to Dex (tenant +
# every vCluster). The bare-metal apiserver is excluded (no OIDC).
#
# Group taxonomy:
#   oidc:platform-admins — full cluster-admin
#   oidc:viewers         — read-only across all resources
#
# Selector: oidc.enabled=true on the SveltosCluster.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: oidc-rbac
spec:
  clusterSelector:
    matchLabels:
      oidc.enabled: "true"
  policyRefs:
    - kind: GitRepository
      apiVersion: source.toolkit.fluxcd.io/v1
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/oidc-rbac
