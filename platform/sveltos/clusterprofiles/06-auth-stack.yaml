# auth-stack — Dex with the built-in password-db connector, served at
# auth.mershab.com on the EXTERNAL Ingress class so off-LAN browsers can
# reach it.
#
# Users + bcrypt'd passwords + per-app OAuth2 client registry live in a
# sealed Secret named `dex-config` in the dex namespace. The Secret is
# created out of band via kubeseal — see
# secrets/infrastructure/dex/README.md.
#
# Federation model: every downstream app gets its OWN entry in Dex's
# `staticClients` list (one client_id, one client_secret, its own redirect
# URIs). Downstream apps bind to Dex via client_id + issuer URL — they don't
# know or care what backend Dex uses to verify the user. This lets us add
# an upstream IdP (GitHub / LLDAP / etc.) later without touching ANY
# downstream app's config: only the Dex `connectors:` block changes.
#
# Day-1 clients (all in dex-config Secret):
#   - kubernetes — shared by tenant Kamaji apiserver + every vCluster
#   - headlamp   — bare-metal cluster admin UI
# Future apps (grafana, home-assistant, frigate, jellyfin, ...) add a
# staticClients entry each when their ClusterProfile lands.
#
# mgmt-only — Dex is a singleton.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: auth-stack
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: mgmt
  dependsOn:
    - tls-stack         # letsencrypt-prod must exist before Dex's Ingress can request a cert
    - ingress-external  # the external Ingress class must be wired
  helmCharts:
    - repositoryURL: https://charts.dexidp.io
      repositoryName: dex
      chartName: dex/dex
      chartVersion: 0.19.x
      releaseName: dex
      releaseNamespace: dex
      helmChartAction: Install
      values: |
        # The Helm chart reads its config from the `dex-config` Secret (we
        # create it out of band, sealed). All static passwords + client
        # secrets are in the Secret; no plaintext in this values block.
        configSecret:
          create: false
          name: dex-config
        config:
          # Issuer URL is hardcoded so Dex generates correctly-formed tokens.
          # The full config (connectors, staticClients, staticPasswords) is
          # in the dex-config Secret keyed `config.yaml`.
          issuer: https://auth.mershab.com
          storage:
            type: kubernetes
            config:
              inCluster: true
          oauth2:
            skipApprovalScreen: true
            alwaysShowLoginScreen: false
        ingress:
          enabled: true
          className: external
          hosts:
            - host: auth.mershab.com
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts: [auth.mershab.com]
              secretName: dex-tls
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            external-dns.alpha.kubernetes.io/hostname: auth.mershab.com
        # ServiceMonitor flips on once observability-core lands.
        serviceMonitor:
          enabled: false
