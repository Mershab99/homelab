# auth-stack — Dex with the built-in password-db connector, served at
# auth.mershab.com via an HTTPRoute on the tenant Traefik Gateway (see
# manifests/tenant-gateway/httproutes.yaml — same cluster, Dex runs on the
# tenant). TLS terminates at the gateway's *.mershab.com wildcard listener;
# external-dns publishes the record from the HTTPRoute's gateway-httproute
# source. No Ingress, no per-Dex cert.
#
# Users + bcrypt'd passwords + per-app OAuth2 client registry live in a
# plaintext Secret named `dex-config` in the dex namespace, applied by hand —
# see secrets/infrastructure/dex/README.md.
#
# Federation model: every downstream app gets its OWN entry in Dex's
# `staticClients` list (one client_id, one client_secret, its own redirect
# URIs). Downstream apps bind to Dex via client_id + issuer URL — they don't
# know or care what backend Dex uses to verify the user. This lets us add
# an upstream IdP (GitHub / LLDAP / etc.) later without touching ANY
# downstream app's config: only the Dex `connectors:` block changes.
#
# Day-1 clients (all in dex-config Secret):
#   - kubernetes — shared by tenant apiserver (k0s) + every vCluster
#   - grafana    — Grafana generic_oauth
# Future apps (home-assistant, ...) add a staticClients entry each when their
# ClusterProfile lands.
#
# Runs on the TENANT (arrakis), NOT mgmt: contraxia is a pure private-cloud
# provider with no auth surface; arrakis is the AIO estate. auth.mershab.com is
# then a SAME-CLUSTER backend on the tenant Traefik gateway (no cross-cluster
# hack). Selector: persona=platform (arrakis, which hosts Dex). Apply the
# dex-config Secret on arrakis.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: auth-stack
spec:
  clusterSelector:
    matchLabels:
      persona: platform
  dependsOn:
    - tenant-ingress  # the tenant Gateway (+ wildcard TLS) must be wired first
  helmCharts:
    - repositoryURL: https://charts.dexidp.io
      repositoryName: dex
      chartName: dex/dex
      chartVersion: 0.19.x
      releaseName: dex
      releaseNamespace: dex
      helmChartAction: Install
      values: |
        # The Helm chart reads its config from the `dex-config` Secret (applied
        # by hand). All static passwords + client secrets are in the Secret; no
        # plaintext in this values block.
        configSecret:
          create: false
          name: dex-config
        config:
          # Issuer URL is hardcoded so Dex generates correctly-formed tokens.
          # The full config (connectors, staticClients, staticPasswords) is
          # in the dex-config Secret keyed `config.yaml`.
          issuer: https://auth.mershab.com
          storage:
            type: kubernetes
            config:
              inCluster: true
          oauth2:
            skipApprovalScreen: true
            alwaysShowLoginScreen: false
        # Routing is an HTTPRoute on the tenant Gateway
        # (manifests/tenant-gateway), not a chart-managed Ingress.
        ingress:
          enabled: false
        # ServiceMonitor flips on once observability-core lands.
        serviceMonitor:
          enabled: false
