# mershab-web — nginx serving mershab.com, installed INSIDE the `mershab` k3k
# shared vCluster. This is the platform success barometer.
#
# No Helm chart — plain native manifests (ConfigMap content + Deployment +
# LoadBalancer Service). No PVC (static content), so it does not depend on the
# kubevirt-csi driver.
#
# Selector: clusterRefs by name targets the mershab SveltosCluster registered
# from the k3k vCluster kubeconfig (docs/runbooks/registering-a-k3k-vcluster.md).
# Public exposure at apex mershab.com is on the mgmt edge — see the gateway
# manifests (apex Certificate + Gateway listener + HTTPRoute).
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: app-mershab-web
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mershab
      namespace: vclusters
  dependsOn:
    - vcluster-baseline
  policyRefs:
    - kind: GitRepository
      apiVersion: source.toolkit.fluxcd.io/v1
      name: homelab
      namespace: flux-system
      path: ./tenants/arrakis/vclusters/mershab/apps/website
