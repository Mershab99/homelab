# k3k-operator — installs the Rancher k3k operator on the tenant (arrakis).
#
# Replaces the former Loft vcluster stack. k3k runs virtual clusters in SHARED
# mode: an agentless k3s control-plane pod whose workloads are reflected onto
# the host (arrakis) nodes via a virtual-kubelet provider, using the host Cilium
# CNI with NetworkPolicy isolation.
#
# RESERVED FOR THE AI/MCP LAYER (Phase 6): the mershab/family vClusters were
# collapsed to flat namespaces; the only vCluster is the throwaway `ai` cluster
# (kagent + KMCP). Its Cluster CR + delivery land in Phase 6.
#
# Selector: persona=platform.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: k3k-operator
spec:
  clusterSelector:
    matchLabels:
      persona: platform
  dependsOn:
    - tenant-baseline
  helmCharts:
    - repositoryURL: https://rancher.github.io/k3k
      repositoryName: k3k
      chartName: k3k/k3k
      chartVersion: 1.1.0        # latest stable (rancher.github.io/k3k index)
      releaseName: k3k
      releaseNamespace: k3k-system
      helmChartAction: Install
