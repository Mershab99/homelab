# k3k-clusters — the k3k Cluster CRs delivered to the tenant. After the
# mershab/family collapse, the ONLY vCluster is `ai` (kagent + KMCP). Reserved
# strictly for the AI/MCP layer; every other workload is a flat namespace.
#
# Selector: persona=platform. dependsOn k3k-operator (CRD must exist first).
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: k3k-clusters
spec:
  clusterSelector:
    matchLabels:
      persona: platform
  dependsOn:
    - k3k-operator
  policyRefs:
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/k3k-clusters
