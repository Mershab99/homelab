# sealed-secrets — Sveltos-delivered. First ClusterProfile to run; many
# downstream profiles bring SealedSecret payloads in their policyRefs that
# need this controller's key to decrypt.
#
# The controller's private key must be backed up off-box IMMEDIATELY after
# first reconcile (see docs/runbooks/disaster-recovery.md).
#
# Targets every cluster with needs.sealed-secrets=true (currently: mgmt
# only — tenant + vClusters use external-secrets or carry their own seals
# downstream).
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: sealed-secrets
spec:
  clusterSelector:
    matchLabels:
      needs.sealed-secrets: "true"
  helmCharts:
    - repositoryURL: https://bitnami-labs.github.io/sealed-secrets
      repositoryName: sealed-secrets
      chartName: sealed-secrets/sealed-secrets
      chartVersion: 2.16.x
      releaseName: sealed-secrets
      releaseNamespace: sealed-secrets
      helmChartAction: Install
      values: |
        fullnameOverride: sealed-secrets-controller
        replicaCount: 1
        metrics:
          serviceMonitor:
            enabled: false   # flips to true after prom-CRDs ClusterProfile lands
