# capi-stack — cluster-api-operator + CAPI providers (k0smotron edition).
#
# cluster-api-operator reconciles the provider CRs; all four come from the
# chart values (helm hooks), and the k0smotron pair + CoreProvider are ALSO
# sveltos-owned raw manifests (policyRef) because of the hook race — see the
# values comment + capi-providers/ file headers. Providers in the stack:
#   core                              — core CAPI controllers
#   bootstrap/k0sproject-k0smotron    — K0sWorkerConfig cloud-init for workers
#   controlPlane/k0sproject-k0smotron — hosted k0s control planes as pods on mgmt
#   infrastructure/kubevirt           — CAPK (VM workers)
#
# k0smotron replaced Kamaji + kubeadm (2026-07): Kamaji v1.0.0's webhook
# capped tenant k8s at 1.30.2 and its edge image broke the published chart
# (binary path). k0smotron runs the tenant CP as k0s pods (etcd statefulset
# included — no external datastore controller), and its bootstrap provider
# replaces CABPK, so the clastix chart is gone entirely.
#
# Versions are pinned as a coherent v1beta2-contract set:
#   operator 0.27.0 / core v1.13.3 (workload k8s ≤1.36) / CAPK v0.11.2 /
#   k0smotron v2.0.3. Don't bump one without checking the others' contract
#   (metadata.yaml releaseSeries) — mixing v1beta1/v1beta2 contract providers
#   is what previously held tenant k8s back.
#
# mgmt-only.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: capi-stack
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: mgmt
  dependsOn:
    - tls-stack   # cluster-api-operator's webhooks need cert-manager
    - virt-host   # CAPK validates against KubeVirt CRDs
  helmCharts:
    - repositoryURL: https://kubernetes-sigs.github.io/cluster-api-operator
      repositoryName: capi-operator
      chartName: capi-operator/cluster-api-operator
      chartVersion: 0.27.0
      releaseName: capi-operator
      releaseNamespace: capi-operator-system
      helmChartAction: Install
      values: |
        # NB: provider CRs are helm HOOKS (delete-policy before-hook-creation).
        # An upgrade deletes+recreates them; if a provider ns (capi-system) is
        # still terminating when hooks re-run, that provider silently vanishes.
        # Bumping this comment forces a re-upgrade to re-run hooks if needed.
        enableHelmHook: true
        # (No manager.featureGates — CAPI v1.13 removed ClusterResourceSet,
        # and passing the gate crashloops the core manager. Nothing here used
        # CRS anyway; Sveltos is the add-on delivery mechanism.)
        # Provider install via operator values. Versions pinned so the
        # helm-hook CRs and the sveltos-owned raw manifests agree.
        # bootstrap/controlPlane MUST stay non-empty: the 0.27 chart's
        # infra-conditions.yaml auto-deploys KUBEADM providers whenever
        # infrastructure is set but bootstrap/controlPlane are empty.
        # The k0smotron pair is ALSO sveltos-owned (k0smotron-providers.yaml
        # in the policyRef below, same doubled treatment as CoreProvider) so
        # the hook delete+recreate race can't permanently eat them — it did
        # exactly that on day one.
        core:
          cluster-api:
            version: v1.13.3
        bootstrap:
          k0sproject-k0smotron:
            version: v2.0.3
        controlPlane:
          k0sproject-k0smotron:
            version: v2.0.3
        infrastructure:
          kubevirt:
            version: v0.11.2
        # addon/helm (HelmChartProxy) disabled — Sveltos delivers tenant CNI
        # directly (11-tenant-cilium.yaml); saves the CAAH controller pod.
        # cert-manager: the 0.27 chart no longer bundles it (we install it
        # separately via tls-stack anyway).
  policyRefs:
    # CoreProvider as raw manifest — chart's helm-hook copy can vanish on
    # upgrade (terminating-ns race); see core-provider.yaml header.
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./clusters/baremetal/addons/capi-providers
