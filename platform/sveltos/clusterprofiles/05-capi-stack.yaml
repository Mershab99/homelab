# capi-stack — cluster-api-operator + CAPI providers (k0smotron edition).
#
# cluster-api-operator reconciles the provider CRs; the chart installs ONLY
# the operator (no provider values, no helm hooks — see values comment), and
# all four provider CRs are sveltos-owned raw manifests (policyRef).
# Providers in the stack:
#   core                              — core CAPI controllers
#   bootstrap/k0sproject-k0smotron    — K0sWorkerConfig cloud-init for workers
#   controlPlane/k0sproject-k0smotron — hosted k0s control planes as pods on mgmt
#   infrastructure/kubevirt           — CAPK (VM workers)
#
# k0smotron replaced Kamaji + kubeadm (2026-07): Kamaji v1.0.0's webhook
# capped tenant k8s at 1.30.2 and its edge image broke the published chart
# (binary path). k0smotron runs the tenant CP as k0s pods (etcd statefulset
# included — no external datastore controller), and its bootstrap provider
# replaces CABPK, so the clastix chart is gone entirely.
#
# Versions are pinned as a coherent v1beta2-contract set:
#   operator 0.27.0 / core v1.13.3 (workload k8s ≤1.36) / CAPK v0.11.2 /
#   k0smotron v2.0.3. Don't bump one without checking the others' contract
#   (metadata.yaml releaseSeries) — mixing v1beta1/v1beta2 contract providers
#   is what previously held tenant k8s back.
#
# mgmt-only.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: capi-stack
spec:
  # Drift detection is load-bearing here: every helm upgrade hook-cycles the
  # provider CRs/namespaces, and when the recreate loses the terminating-ns
  # race the CRs vanish WITHOUT changing sveltos's hash — plain Continuous
  # mode never re-applies them. Drift detection puts them back.
  syncMode: ContinuousWithDriftDetection
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: mgmt
  dependsOn:
    - tls-stack   # cluster-api-operator's webhooks need cert-manager
    - virt-host   # CAPK validates against KubeVirt CRDs
  helmCharts:
    - repositoryURL: https://kubernetes-sigs.github.io/cluster-api-operator
      repositoryName: capi-operator
      chartName: capi-operator/cluster-api-operator
      chartVersion: 0.27.0
      releaseName: capi-operator
      releaseNamespace: capi-operator-system
      helmChartAction: Install
      values: |
        # OPERATOR-ONLY install: NO provider values, NO helm hooks. The chart's
        # provider-CRs-as-hooks design is atomic-failure-prone: if any hook hits
        # a not-yet-ready operator webhook or a terminating namespace, the whole
        # install fails, Sveltos remediation uninstalls the operator, namespaces
        # go Terminating, and the next attempt fails on THEM — infinite loop
        # (2026-07-16 power-cycle recovery hit exactly this). All four provider
        # CRs live in the policyRef below instead; the Resources feature retries
        # each apply independently until the operator webhook is ready.
        # Leaving core/bootstrap/controlPlane/infrastructure unset also means
        # the chart's infra-conditions.yaml never auto-deploys kubeadm providers.
        # (No manager.featureGates — CAPI v1.13 removed ClusterResourceSet,
        # and passing the gate crashloops the core manager.)
        # addon/helm (HelmChartProxy) disabled — Sveltos delivers tenant CNI
        # directly (11-tenant-cilium.yaml); saves the CAAH controller pod.
        # cert-manager: the 0.27 chart no longer bundles it (we install it
        # separately via tls-stack anyway).
        enableHelmHook: false
  policyRefs:
    # ALL provider CRs (core, k0smotron bootstrap+controlPlane, kubevirt infra)
    # as raw manifests — versions pinned in the files, contract set documented
    # in the header above.
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./clusters/baremetal/addons/capi-providers
