# Home Assistant — FLAT namespace on arrakis (collapsed out of the `family`
# vCluster). PRIVATE: no Ingress, no LoadBalancer — the UI is reached over the
# NetBird overlay via a NetworkResource. HA keeps a Multus LAN NIC for device
# control (mDNS / Matter / Zigbee-Zwave coordinators) — full-remote drops LAN
# *exposure*, not device connectivity.
#
# Two delivery channels:
#   1. helmCharts — pajikos/home-assistant. Namespace, PVC, Deployment, Service.
#      Pod annotated with Multus to attach to the LAN. Ingress OFF.
#   2. policyRefs — tenants/arrakis/apps/home-assistant/ for the `lan` NAD + the
#      NetBird NetworkResource that publishes HA on the overlay.
#
# Selector: persona=platform (flat, no vCluster).
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: app-home-assistant
spec:
  clusterSelector:
    matchLabels:
      persona: platform
  dependsOn:
    - tenant-baseline   # kubevirt-csi for the PVC
    - netbird           # NetworkResource CRD + the homelab routing peer
  helmCharts:
    - repositoryURL: https://pajikos.github.io/home-assistant-helm-chart/
      repositoryName: pajikos
      chartName: pajikos/home-assistant
      chartVersion: 0.2.x
      releaseName: home-assistant
      releaseNamespace: home-assistant
      helmChartAction: Install
      values: |
        persistence:
          enabled: true
          storageClass: kubevirt   # routes via kubevirt-csi to bare-metal longhorn
          size: 10Gi
        # PRIVATE — no Ingress. Reached over NetBird (see the NetworkResource in
        # tenants/arrakis/apps/home-assistant/). FULL-REMOTE: no internal LB class.
        ingress:
          enabled: false
        # Multus LAN attach — HA needs LAN for mDNS / zwave coordinator / etc.
        podAnnotations:
          k8s.v1.cni.cncf.io/networks: lan
  policyRefs:
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./tenants/arrakis/apps/home-assistant
