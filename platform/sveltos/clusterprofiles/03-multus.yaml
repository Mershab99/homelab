# Multus thick-DaemonSet — Sveltos-delivered. Secondary-CNI plugin that
# lets KubeVirt VMs attach additional NICs (e.g. a host-bridge macvlan into
# br0 so VMs land on the LAN).
#
# Multus auto-detects the default CNI from /etc/cni/net.d — Cilium installs
# first, so Multus delegates pod-network traffic to Cilium and overlays
# secondary attachments from NetworkAttachmentDefinitions.
#
# Fans out to every cluster with needs.multus=true — tenant/vClusters. NOT
# mgmt: HCO's network-addons sub-operator installs Multus there (see
# 04-virt-host.yaml), so mgmt is not labeled needs.multus.
#
# Delivered as a raw manifest (policyRef), not Helm: the k8snetworkplumbingwg
# org stopped publishing a Helm index. The manifest carries a load-bearing
# Talos netns patch — see its header.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: multus
spec:
  clusterSelector:
    matchLabels:
      needs.multus: "true"
  policyRefs:
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/multus
