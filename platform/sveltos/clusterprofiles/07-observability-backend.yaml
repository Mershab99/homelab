# observability-backend — Loki (MinIO S3 backend) + Grafana operator +
# Grafana CR with Dex OIDC.
#
# Loki S3 credentials come from the `loki-minio` Secret (SOPS, delivered by
# Flux from secrets/infrastructure/minio/) — the same keypair MinIO uses as
# its root creds. MinIO itself is delivered by the `storage` bundle.
#
# Grafana auth via Dex generic_oauth. Client_secret comes from a sealed
# Secret named `grafana-oidc` in the monitoring ns (see
# secrets/infrastructure/grafana/README.md).
#
# mgmt-only — single observability backend for the whole homelab.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: observability-backend
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: mgmt
  dependsOn:
    - observability-core   # prom-CRDs + OTel must be up first
    - storage              # MinIO (S3 backend) + longhorn StorageClass
    - auth-stack           # Grafana OIDC client lives in dex-config
    - sealed-secrets       # for grafana-oidc Secret
  helmCharts:
    - repositoryURL: https://grafana.github.io/helm-charts
      repositoryName: grafana
      chartName: grafana/loki
      chartVersion: 6.x
      releaseName: loki
      releaseNamespace: monitoring
      helmChartAction: Install
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: minio.monitoring.svc.cluster.local:9000
              s3ForcePathStyle: true
              insecure: true
              # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY come from the
              # loki-minio Secret via extraEnvFrom below.
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: longhorn
            size: 10Gi
          extraEnvFrom:
            - secretRef:
                name: loki-minio
        # Disable the chart's read/write/backend split (single-binary mode).
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        lokiCanary:
          enabled: false
        test:
          enabled: false
    - repositoryURL: https://grafana.github.io/helm-charts
      repositoryName: grafana
      chartName: grafana/grafana-operator
      chartVersion: 5.x
      releaseName: grafana-operator
      releaseNamespace: monitoring
      helmChartAction: Install
      values: |
        # Watch the monitoring namespace only — Grafana CR lives there.
        namespaceScope: false
  policyRefs:
    - kind: GitRepository
      apiVersion: source.toolkit.fluxcd.io/v1
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/observability-backend
