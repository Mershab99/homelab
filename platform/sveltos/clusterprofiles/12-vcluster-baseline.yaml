# vcluster-baseline — runs INSIDE every vCluster (selected by the
# sveltos.projectsveltos.io/type=vcluster label set when the k3k vCluster is
# registered with the hub from its kubeconfig — see
# docs/runbooks/registering-a-k3k-vcluster.md).
#
# Manifests delivered via GitRepository policyRef (consistent with
# tenant-arrakis, virt-host, etc. — no inline ConfigMap wrangling).
#
# OIDC RBAC (cluster-admin → oidc:platform-admins, view → oidc:viewers) is
# delivered by the separate 11-oidc-rbac ClusterProfile, which also matches
# vClusters since they have oidc.enabled=true.
#
# Prometheus scraping happens at the tenant layer (tenant OTel does
# cluster-wide pod discovery and picks up vCluster pods automatically).
# No agent inside vClusters — see docs/architecture.md.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: vcluster-baseline
spec:
  clusterSelector:
    matchLabels:
      sveltos.projectsveltos.io/type: vcluster
  policyRefs:
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/vcluster-baseline
