# storage — Longhorn across all 15× 2TB Samsung SSDs on the R730.
#
# Disks are Talos UserVolumes (UserVolumeConfig → /var/mnt/lh01..15, selected
# by disk model) and auto-registered via the node's default-disks-config
# annotation — see bootstrap/talos/controlplane.yaml. Longhorn just consumes them.
#
# Single node day-1: replicas land on different DISKS (disk-level anti-affinity)
# so a single SSD failure doesn't lose a volume. Bump node anti-affinity when the
# R820 joins for cross-node replicas.
#
# persona=infra — storage runs on the bare-metal cluster; tenants consume it via
# kubevirt-csi (tenant-baseline bundle).
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: storage
spec:
  clusterSelector:
    matchLabels:
      persona: infra
  helmCharts:
    - repositoryURL: https://charts.longhorn.io
      repositoryName: longhorn
      chartName: longhorn/longhorn
      chartVersion: 1.7.x
      releaseName: longhorn
      releaseNamespace: longhorn-system
      helmChartAction: Install
      values: |
        # iscsi/util-linux come from Talos system extensions (see r730-schematic).
        persistence:
          defaultClass: true
          defaultClassReplicaCount: 2     # 2 replicas across different SSDs
          defaultDataLocality: best-effort
        defaultSettings:
          # Single node → allow replicas on the same node, but force them onto
          # different disks so one SSD dying doesn't take the volume.
          replicaSoftAntiAffinity: true
          replicaDiskSoftAntiAffinity: false
          defaultDataPath: /var/lib/longhorn
          createDefaultDiskLabeledNodes: true
          # Loki/MinIO etc. are fine with Delete; flip per-PVC if needed.
        longhornUI:
          replicas: 1
  policyRefs:
    # MinIO (Loki S3) + the tenants-storage ResourceQuota as native manifests.
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/storage
