# tenant-baseline — addons that EVERY tenant cluster needs inside itself.
# Today: just kubevirt-csi (passthrough CSI so tenant PVCs land on the
# bare-metal longhorn storage class).
#
# What's NOT here:
#   - Cilium  — own profile (11-tenant-cilium.yaml) so it installs first;
#     everything else here needs schedulable pods.
#   - cluster-autoscaler — runs on the BARE-METAL cluster, not on tenant
#     (see 05b-cluster-autoscaler.yaml). Per
#     https://cluster-api.sigs.k8s.io/tasks/automated-machine-management/autoscaling
#     — CAS on mgmt is the simpler topology (no cross-cluster kubeconfig
#     seal, CAPI auto-creates the tenant kubeconfig Secret CAS reads).
#
# Selector: persona=platform.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: tenant-baseline
spec:
  clusterSelector:
    matchLabels:
      persona: platform
  dependsOn:
    - tenant-cilium   # CNI first — CSI pods can't schedule without it
  policyRefs:
    # kubevirt-csi — vendored manifest + StorageClass. No tenant-side Helm
    # chart exists upstream; the appscode chart is the infra-side install.
    # See tenants/arrakis/addons/kubevirt-csi/README.md for the one-liner curl
    # to populate the placeholder.
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./tenants/arrakis/addons/kubevirt-csi
