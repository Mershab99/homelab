# virt-host — KubeVirt HCO via OLM.
#
# HCO is published on operatorhub.io as `community-kubevirt-hyperconverged`.
# We install it by applying three small YAMLs:
#   1. OperatorGroup — scopes the operator to its namespace
#   2. Subscription — tells OLM to install + keep it updated
#   3. HyperConverged CR — our customizations (PCI passthrough, scratch
#      space storage class, defaultCPUModel)
#
# HCO bundles KubeVirt + CDI + SSP + Network Addons (Multus) + Node
# Maintenance — applying the HyperConverged CR rolls all of them out.
#
# Multus note: HCO's network-addons sub-operator installs Multus on mgmt (infra),
# so 03-multus (persona=platform) does NOT run here — that would double-install.
# The platform cluster has no HCO, so it gets Multus from 03-multus.
#
# Selector: persona=infra.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: virt-host
spec:
  clusterSelector:
    matchLabels:
      persona: infra
  dependsOn:
    - olm         # need OLM CRDs (Subscription/OperatorGroup) before we apply Subscription
    - storage     # CDI scratchSpace lands on the longhorn StorageClass
  policyRefs:
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./clusters/baremetal/addons/kubevirt-hco
