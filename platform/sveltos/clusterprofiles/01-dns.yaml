# dns — external-dns, reading Ingress/Service hostnames and publishing
# Cloudflare records. Multi-cluster: matches any cluster labelled needs.dns
# (mgmt + tenant). Every instance shares the mershab.com zone, so txtOwnerId +
# txtPrefix are templated per cluster name (Sveltos exposes .Cluster) — that
# unique owner-id + record prefix is what keeps two external-dns instances from
# clobbering each other's TXT registry (external-dns multi-instance docs).
#
# CF token Secret (cloudflare-api-token, ns external-dns) must exist on each
# matched cluster — for the tenant, apply it there by hand too.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: dns
spec:
  clusterSelector:
    matchLabels:
      needs.dns: "true"
  helmCharts:
    - repositoryURL: https://kubernetes-sigs.github.io/external-dns
      repositoryName: external-dns
      chartName: external-dns/external-dns
      chartVersion: 1.15.2   # pinned exact: wildcard "1.15.x" tripped sveltos semver.NewVersion → "invalid semantic version"
      releaseName: external-dns
      releaseNamespace: external-dns
      helmChartAction: Install
      values: |
        provider:
          name: cloudflare
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: api-token
        domainFilters:
          - mershab.com          # matches mershab.com + all subdomains (flat *.mershab.com scheme)
        sources:
          - ingress              # Dex (legacy external class via Traefik)
          - service
          # gateway-httproute only where Gateway API exists (mgmt/Traefik);
          # on tenants the informer sync fatals and crashloops the pod.
          {{ if eq .Cluster.metadata.name "mgmt" }}- gateway-httproute{{ end }}
        txtOwnerId: homelab-{{ .Cluster.metadata.name }}
        txtPrefix: "edns-{{ .Cluster.metadata.name }}-"
        policy: sync
        registry: txt
        serviceMonitor:
          enabled: false
