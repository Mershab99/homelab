# tenant-arrakis — delivers the entire CAPI definition for the `arrakis` tenant
# cluster (Cluster + KamajiControlPlane + KubevirtCluster + 3 ×
# KubeVirtMachineTemplate + 3 × KubeadmConfigTemplate + 3 × MachineDeployment
# + MHC + br-multus NAD + Cilium HelmChartProxy) to mgmt.
#
# Sveltos reads from the Flux GitRepository directly — no ConfigMap wrangling.
#
# After this profile reconciles:
#   1. KamajiControlPlane spins up tenant kube-apiserver as pods on mgmt.
#   2. CAPK creates KubeVirt VMs per MachineDeployment.
#   3. CABPK supplies cloud-init that runs `kubeadm join` against Kamaji.
#   4. The tenant cluster auto-registers as a SveltosCluster via CAPI
#      integration. Its CAPI Cluster CR labels propagate.
#   5. tenant-cilium installs CNI (Sveltos needs no pods on tenant for helm),
#      then tenant-baseline + tenant-gpu + oidc-rbac fan out the rest.
#
# mgmt-only — these are CAPI CRs reconciled by the CAPI providers on mgmt.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: tenant-arrakis
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: mgmt
  dependsOn:
    - capi-stack    # CAPI + Kamaji + providers must be Running
    - virt-host     # KubeVirt HCO must be ready for KubeVirtMachine
                    # (HCO's CNAO also provides mgmt's Multus for the br-multus
                    # NAD — the `multus` profile targets tenants only and never
                    # matches mgmt, so it must NOT be a dependency here)
    - storage       # longhorn for Kamaji etcd PVCs + KubeVirt CDI
  policyRefs:
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./tenants/arrakis/infra
