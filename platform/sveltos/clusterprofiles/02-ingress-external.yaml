# ingress-external — chisel-operator + ExitNode(s) on mgmt.
#
# mgmt exposes ONLY the tenant control-plane LoadBalancers (kmc-<tenant>-lb)
# through chisel — no Gateway/Traefik on mgmt. chisel-operator binds ONE
# Service per ExitNode (1:1 — hard-learned 2026-07-16: two LB Services and
# one ExitNode flip-flop, whoever reconciles last steals the tunnel and the
# other goes dark).
#
# App ingress (Traefik + Gateway API) belongs on the tenant (arrakis) —
# delivered by a tenant-targeted profile, with its own chisel-operator +
# ExitNode there when it lands.
#
# mgmt-only.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: ingress-external
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: mgmt
  dependsOn:
    - tls-stack
  helmCharts:
    - repositoryURL: oci://ghcr.io/fyralabs/chisel-operator
      repositoryName: chisel-operator
      chartName: chisel-operator/chisel-operator
      chartVersion: v0.7.1
      releaseName: chisel-operator
      releaseNamespace: chisel-operator-system
      helmChartAction: Install
      values: |
        loadBalancerClass: chisel.mershab.com/external
  policyRefs:
    # One ExitNode per VPS. With one VPS + 1:1 binding, node-01 carries the
    # arrakis API (kmc-arrakis-lb, 6443/8132).
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./clusters/baremetal/addons/chisel-operator/exit-nodes
