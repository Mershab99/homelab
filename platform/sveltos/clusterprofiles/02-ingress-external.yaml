# ingress-external — chisel-operator + ExitNode + Traefik v3 (Gateway API).
#
# Traefik is the single edge proxy: it implements Gateway API (homelab services
# on *.homelab.mershab.com via HTTPRoute) AND still serves the legacy `external`
# IngressClass (Dex at auth.mershab.com). Its Service carries the chisel
# loadBalancerClass, so chisel-operator tunnels the entrypoint to the ExitNode
# (the only path to the internet — no local LB).
#
# Day-1: exit-nodes/ ships one placeholder ExitNode (no VPS yet); Traefik's
# Service sits Pending an external IP until a node's host/auth is filled — see
# clusters/baremetal/addons/chisel-operator/exit-nodes/node-01.yaml.
#
# mgmt-only.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: ingress-external
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: mgmt
  dependsOn:
    - tls-stack
  helmCharts:
    - repositoryURL: oci://ghcr.io/fyralabs/chisel-operator
      repositoryName: chisel-operator
      chartName: chisel-operator/chisel-operator
      chartVersion: v0.7.1
      releaseName: chisel-operator
      releaseNamespace: chisel-operator-system
      helmChartAction: Install
      values: |
        loadBalancerClass: chisel.mershab.com/external
    - repositoryURL: https://traefik.github.io/charts
      repositoryName: traefik
      chartName: traefik/traefik
      chartVersion: 33.x
      releaseName: traefik
      releaseNamespace: traefik
      helmChartAction: Install
      values: |
        # Providers: Gateway API (homelab services) + CRD (IngressRoute for the
        # dashboard) + Ingress (legacy `external` class = Dex).
        providers:
          kubernetesGateway:
            enabled: true
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true
            ingressClass: external
        # We define our own GatewayClass/Gateway in manifests/gateway — don't let
        # the chart create a default one.
        gateway:
          enabled: false
        gatewayClass:
          enabled: false
        # The dashboard is exposed via an IngressRoute (manifests/gateway),
        # UNAUTHENTICATED + internal-only — keep the insecure API off.
        api:
          dashboard: true
          insecure: false
        service:
          type: LoadBalancer
          spec:
            loadBalancerClass: chisel.mershab.com/external
          externalTrafficPolicy: Local
          annotations:
            # Point the tenant apiserver FQDN at Traefik's chisel-assigned VPS IP.
            # The apiserver rides through here via an IngressRouteTCP (TLS
            # passthrough) — see tenants/arrakis/infra/apiserver-ingressroutetcp.yaml.
            external-dns.alpha.kubernetes.io/hostname: k8s-home.mershab.com
  policyRefs:
    # One ExitNode per VPS — chisel-operator load-balances Traefik's egress
    # across them. Add nodes by dropping a file in exit-nodes/.
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./clusters/baremetal/addons/chisel-operator/exit-nodes
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/gateway
