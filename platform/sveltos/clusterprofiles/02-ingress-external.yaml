# ingress-external — chisel-operator + ExitNode + Traefik v3 (Gateway API).
#
# Traefik is the single edge proxy: it implements Gateway API (homelab services
# on *.homelab.mershab.com via HTTPRoute) AND still serves the legacy `external`
# IngressClass (Dex at auth.mershab.com). Its Service carries the chisel
# loadBalancerClass, so chisel-operator tunnels the entrypoint to the ExitNode
# (the only path to the internet — no local LB).
#
# Day-1: ExitNode is a placeholder (no VPS yet); Traefik's Service sits Pending
# an external IP until the ExitNode is wired — see
# clusters/baremetal/addons/chisel-operator/README.md.
#
# mgmt-only.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: ingress-external
spec:
  clusterRefs:
    - kind: SveltosCluster
      apiVersion: lib.projectsveltos.io/v1beta1
      name: mgmt
      namespace: projectsveltos
  dependsOn:
    - tls-stack
    - sealed-secrets
  helmCharts:
    - repositoryURL: oci://ghcr.io/fyralabs/chisel-operator
      repositoryName: chisel-operator
      chartName: chisel-operator/chisel-operator
      chartVersion: 0.4.x
      releaseName: chisel-operator
      releaseNamespace: chisel-operator-system
      helmChartAction: Install
      values: |
        loadBalancerClass: chisel.mershab.com/external
    - repositoryURL: https://traefik.github.io/charts
      repositoryName: traefik
      chartName: traefik/traefik
      chartVersion: 33.x
      releaseName: traefik
      releaseNamespace: traefik
      helmChartAction: Install
      values: |
        # Providers: Gateway API (homelab services) + CRD (Middleware/IngressRoute
        # for forwardAuth + dashboard) + Ingress (legacy `external` class = Dex).
        providers:
          kubernetesGateway:
            enabled: true
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true
            ingressClass: external
        # We define our own GatewayClass/Gateway in manifests/gateway — don't let
        # the chart create a default one.
        gateway:
          enabled: false
        gatewayClass:
          enabled: false
        # The dashboard is exposed via an IngressRoute (manifests/gateway), gated
        # by oauth2-proxy — keep the insecure API off.
        api:
          dashboard: true
          insecure: false
        service:
          type: LoadBalancer
          spec:
            loadBalancerClass: chisel.mershab.com/external
          externalTrafficPolicy: Local
  policyRefs:
    - kind: GitRepository
      apiVersion: source.toolkit.fluxcd.io/v1
      name: homelab
      namespace: flux-system
      path: ./clusters/baremetal/addons/chisel-operator
    - kind: GitRepository
      apiVersion: source.toolkit.fluxcd.io/v1
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/gateway
