# tls-stack — cert-manager + ClusterIssuers (letsencrypt-prod + selfsigned-ca
# + the self-signed bootstrap chain).
#
# Single bundle because the ClusterIssuers have no meaning without
# cert-manager and vice versa. Cloudflare API token is a plaintext Secret
# applied by hand (see secrets/infrastructure/cert-manager/README.md).
#
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: tls-stack
spec:
  clusterSelector:
    matchExpressions:
      - {key: persona, operator: In, values: [infra, platform]}
  helmCharts:
    - repositoryURL: https://charts.jetstack.io
      repositoryName: jetstack
      chartName: jetstack/cert-manager
      chartVersion: v1.15.5   # pinned exact: wildcard "v1.15.x" trips sveltos semver on upgrade (same as external-dns)
      releaseName: cert-manager
      releaseNamespace: cert-manager
      helmChartAction: Install
      values: |
        crds:
          enabled: true
        global:
          leaderElection:
            namespace: cert-manager
        prometheus:
          enabled: false   # flips on once observability-core lands
  policyRefs:
    # ClusterIssuers + homelab-ca Certificate as native manifests.
    - kind: GitRepository
      name: homelab
      namespace: flux-system
      path: ./platform/sveltos/manifests/tls-stack
