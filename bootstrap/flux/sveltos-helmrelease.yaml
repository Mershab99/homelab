# Sveltos, installed by Flux helm-controller. This is the ONE HelmRelease in
# the whole repo — Flux installs Sveltos, Sveltos installs everything else.
#
# Lives in flux-system (where the controllers + HelmRepository are) but installs
# into projectsveltos (createNamespace handles the ns). Once Running, the
# bare-metal cluster auto-registers as SveltosCluster `mgmt`; label it, then
# apply clusters/baremetal/sveltos-root.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sveltos
  namespace: flux-system
spec:
  interval: 15m
  releaseName: projectsveltos
  targetNamespace: projectsveltos
  chart:
    spec:
      chart: projectsveltos
      version: 1.11.x
      sourceRef:
        kind: HelmRepository
        name: projectsveltos
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
  values:
    # Default controller set (addon-controller, classifier,
    # sveltoscluster-manager, event-manager, healthcheck-manager) + dashboard.
    telemetry:
      disabled: true
