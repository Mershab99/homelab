# FluxInstance — Flux Operator reads this and reconciles the listed Flux
# controllers into flux-system. This is the only place Flux's own version
# is pinned.
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: 2.4.x
    registry: ghcr.io/fluxcd
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
    # Skip image-reflector + image-automation for v1; bring online when we
    # actually want image-bumping via Git.
  cluster:
    networkPolicy: true
  commonMetadata:
    labels:
      app.kubernetes.io/part-of: flux
  sync:
    kind: GitRepository
    name: homelab
    namespace: flux-system
    path: ./clusters/baremetal
    interval: 10m
    ref: refs/heads/master
    pullSecret: flux-repo-pat
  kustomize:
    patches:
      # Sanity: prevent any Kustomization from silently disabling pruning.
      - target:
          kind: Kustomization
          group: kustomize.toolkit.fluxcd.io
        patch: |
          - op: add
            path: /spec/decryption
            value:
              provider: sops
              secretRef:
                name: sops-age
