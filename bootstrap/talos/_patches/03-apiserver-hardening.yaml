# kube-apiserver hardening — PodSecurity admission + audit policy.
# Matches the working arrakis config, minus the metallb-system exemption
# (we use Cilium L2 announcer, not MetalLB).
#
# OIDC extraArgs are intentionally NOT here — they go in
# phase2-apiserver-oidc.yaml, applied AFTER Dex is up.
cluster:
  apiServer:
    disablePodSecurityPolicy: true
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: baseline
            enforce-version: latest
            audit: restricted
            audit-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
            runtimeClasses: []
            usernames: []
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
