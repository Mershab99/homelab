# Boot-time manifests Talos applies before Flux exists.
#
# These are the exact URLs Sidero documents for metrics-server on Talos
# (https://docs.siderolabs.com/kubernetes-guides/monitoring-and-observability/deploy-metrics-server).
# The pair works together:
#
#   - kubelet-serving-cert-approver auto-approves kubelet serving CSRs that
#     the kubelet generates because of `rotate-server-certificates: true`
#     (set in 02-kubelet.yaml). Without it, CSRs stick Pending and rotated
#     kubelet certs never get signed.
#   - metrics-server scrapes kubelets over TLS. Because kubelet now has a
#     properly signed serving cert (thanks to the approver), metrics-server
#     can verify TLS without --kubelet-insecure-tls.
#
# This is the official Talos path. URLs are unpinned to follow upstream
# defaults — pin to release tags if/when we treat this cluster as long-lived.
cluster:
  extraManifests:
    - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/main/deploy/standalone-install.yaml
    - https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
