# Cilium inline bootstrap manifest.
#
# Generation: `task bootstrap:render`
#   → helm template cilium/cilium with infrastructure/cilium/values.yaml
#   → output committed to gen/cilium-bootstrap.yaml
#
# At apply time, `task talos:hub:config` reads gen/cilium-bootstrap.yaml and
# inlines it as cluster.inlineManifests[0].contents below. The placeholder is
# replaced by the contents of that file. After bootstrap, Flux's HelmRelease
# adopts the same release name + namespace and takes over upgrades.
cluster:
  inlineManifests:
    - name: cilium-bootstrap
      contents: |
        # placeholder — replaced by gen/cilium-bootstrap.yaml at config-render time
        # (talosctl gen config will substitute via --config-patch on a copy of this file)
