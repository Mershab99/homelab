# Cilium bootstrap values — Talos-compatible. FULL-REMOTE: no LAN LoadBalancer.
#
# Most knobs here are required for Cilium to come up on Talos at all (cgroup,
# securityContext, kubeProxyReplacement). Hubble is enabled.
#
# There is NO LAN LoadBalancer path: no LB IPAM pool, no L2AnnouncementPolicy,
# no `internal` LB class. The only ingress paths are the chisel reverse tunnel
# (public, → VPS) and the Netbird overlay (private). l2announcements/externalIPs
# stay OFF below and no Cilium LB CRs are delivered by Flux/Sveltos.

# Cilium replaces kube-proxy entirely (cluster.proxy.disabled: true in Talos
# machineconfig). Cilium needs to know where the apiserver is, since
# kube-proxy isn't there to proxy 10.96.0.1.
kubeProxyReplacement: true
k8sServiceHost: 192.168.2.70   # R730 CP node — pin to a Cilium LB VIP when R820 joins
k8sServicePort: 6443

# Talos-specific cgroup wiring. Cilium expects to mount its own cgroup root;
# Talos has already set it up.
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos drops most capabilities by default — Cilium's agent + clean-state
# init container need a small set re-added.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - PERFMON
      - BPF
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# IPAM in kubernetes mode (per IPAM design decision — simple single pod CIDR,
# revisit multi-pool if/when we segregate tenants at the bare-metal layer).
ipam:
  mode: kubernetes

# REQUIRED for KubeVirt: socket-LB normally translates ClusterIPs at
# connect() inside the pod netns — VM traffic (KubeVirt masquerade NAT)
# never touches sockets, so its packets left the node untranslated
# (identity ->world, blackholed). hostNamespaceOnly pushes pod-netns
# traffic to per-packet translation in bpf, which VMs do hit.
# Symptom this fixes: guest can't resolve/reach any ClusterIP (worker VMs
# failed to resolve get.k0s.sh / join the tenant CP).
socketLB:
  hostNamespaceOnly: true

# Pod CIDR matches Talos default. Adjust if you override it in the
# machineconfig.
ipv4:
  enabled: true
ipv6:
  enabled: false

# Routing — tunnel (vxlan) keeps the flat-LAN host network untouched.
# Switching to native routing is a Phase-N optimization, not a bootstrap need.
routingMode: tunnel
tunnelProtocol: vxlan

# FULL-REMOTE: no LAN LoadBalancer. Keep L2 announce + externalIPs OFF; no LB
# IPAM pools or L2AnnouncementPolicy CRs are delivered. Public = chisel tunnel,
# private = Netbird overlay.
l2announcements:
  enabled: false
externalIPs:
  enabled: false

# Don't claim CNI exclusivity — Multus installs a thick CNI later that
# delegates to Cilium for the default network, and that needs the directory
# writable.
cni:
  exclusive: false

# Hubble + UI. Ingress for the UI lands later via Flux.
hubble:
  enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2
  relay:
    enabled: true
  ui:
    enabled: true

# Standard operator settings; left at chart defaults except for pod CIDR.
operator:
  replicas: 1   # single node; bump when R820 joins
