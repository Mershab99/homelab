# Sveltos controller — addon-controller + classifier + sveltoscluster-manager
# + healthcheck-manager + event-manager + UI dashboard.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sveltos
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: homelab
  path: ./clusters/baremetal/platform/sveltos
  prune: true
  wait: true
  timeout: 5m
