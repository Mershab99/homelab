# Top-level Kustomize for the bare-metal cluster's GitOps tree.
#
# The root Flux Kustomization (bootstrap/flux/root-kustomization.yaml) points
# here. This file lists the layer-level Flux Kustomization CRs which in turn
# reconcile each layer's subdirectory.
#
# Architecture: Flux installs only the bare-metal bootstrap minimum (this
# `infrastructure/` tree + the `platform/sveltos/` controller). Everything
# else — cert-manager, ingress-nginx, Dex, observability, tenant addons —
# is delivered as Sveltos ClusterProfiles from `sveltos-fanout-ks.yaml`,
# which points at the top-level `platform/sveltos/clusterprofiles/` tree.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - infrastructure-ks.yaml    # Cilium CRs + namespaces
  - platform-ks.yaml          # Sveltos controller install
  - sveltos-fanout-ks.yaml    # ClusterProfiles — delivers everything else
