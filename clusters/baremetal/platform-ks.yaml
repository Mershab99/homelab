# Platform layer — only Sveltos itself lives here.
#
# After this Kustomization is Ready, the bare-metal cluster auto-registers
# as a SveltosCluster named `mgmt` in the projectsveltos namespace, and the
# sveltos-fanout-ks Kustomization can start reconciling ClusterProfiles
# from platform/sveltos/clusterprofiles/.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: homelab
  path: ./clusters/baremetal/platform
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: infrastructure
