# CoreProvider owned declaratively (NOT by the capi-operator chart's helm
# hooks). The chart renders provider CRs as post-install/post-upgrade hooks
# with delete-policy before-hook-creation: an upgrade deletes+recreates them,
# and if the provider namespace is still terminating when hooks re-run, the
# CR creation fails silently and the provider vanishes (happened 2026-07-15
# to CoreProvider/capi-system). Sveltos owning it here means it always comes
# back.
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  # Keep in lockstep with the pin in 05-capi-stack.yaml values — the helm-hook
  # copy and this one must agree or they fight over spec.version.
  version: v1.13.3
  manager:
    featureGates:
      ClusterResourceSet: true
