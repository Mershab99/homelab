# OLM OperatorGroup — HCO (community-kubevirt-hyperconverged) only supports
# the AllNamespaces install mode (OwnNamespace/SingleNamespace/MultiNamespace
# are all unsupported by its CSV). AllNamespaces is expressed by an
# OperatorGroup with an EMPTY spec (no targetNamespaces). Setting
# targetNamespaces to this operator's own namespace triggers OwnNamespace
# mode, which the CSV rejects with "UnsupportedOperatorGroup".
apiVersion: v1
kind: Namespace
metadata:
  name: kubevirt-hyperconverged
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: kubevirt-hyperconverged
  namespace: kubevirt-hyperconverged
spec: {}
