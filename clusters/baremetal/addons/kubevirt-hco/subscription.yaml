# OLM Subscription — tells OLM to install + keep updated the
# community-kubevirt-hyperconverged operator from the official OperatorHub
# CatalogSource.
#
# OLM installs the operator + all bundled operators (KubeVirt, CDI, SSP,
# Network Addons (Multus), Node Maintenance). Creating the HyperConverged
# CR (hyperconverged.yaml) then activates them.
#
# Upgrades: bump `channel` to roll forward; OLM applies the new CSV.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: community-kubevirt-hyperconverged
  namespace: kubevirt-hyperconverged
spec:
  channel: stable
  name: community-kubevirt-hyperconverged
  source: operatorhubio-catalog
  sourceNamespace: olm-system
  installPlanApproval: Automatic
