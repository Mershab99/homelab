# chisel ExitNode 02 — SAME racknerd VPS as node-01, second binding.
# chisel-operator pairs each LoadBalancer Service 1:1 with an ExitNode, so one
# VPS needs one ExitNode CR per tunnelled Service: node-01 carries traefik
# (80/443), node-02 carries the arrakis API (kmc-arrakis-lb, 6443/8132).
# Same chisel server + auth token; the server multiplexes clients, and the
# tunnelled port sets don't overlap.
apiVersion: chisel-operator.io/v1
kind: ExitNode
metadata:
  name: node-02
  namespace: chisel-operator-system
spec:
  host: "72.11.146.116" # racknerd VPS public IPv4 (same box as node-01)
  port: 9090            # chisel control port; match the VPS server --port
  auth: node-01-credentials
