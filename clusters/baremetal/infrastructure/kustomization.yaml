# Infrastructure layer — Flux installs ONLY what Sveltos cannot bootstrap
# itself:
#
#   - Cilium runtime CRs (LB pool + L2 announce) — bare-metal LAN topology,
#     not deliverable via Helm
#   - Namespaces every subsystem will eventually need
#
# Sveltos itself is installed by the platform layer (one layer up).
# Everything that fans out — cert-manager, external-dns, Longhorn, KubeVirt
# HCO, CAPI providers, ingress, Dex, observability, tenant + vCluster
# scaffolding — is a ClusterProfile in platform/sveltos/clusterprofiles/.
# Secrets are plaintext + applied by hand (see secrets/README.md).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
