# Namespaces. Sveltos and its prereq sit here; the rest (cert-manager,
# kubevirt, capi-system, traefik, external-dns,
# chisel-operator-system) are created by the Sveltos ClusterProfile that
# installs the corresponding chart.
apiVersion: v1
kind: Namespace
metadata:
  name: projectsveltos
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
# Longhorn needs privileged PSA (host mounts, iscsi). Pre-created here so the
# label is set before the storage ClusterProfile installs the chart.
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
# tenants/ holds CAPI Cluster CRs delivered by Sveltos to mgmt — keep here
# so the namespace exists before the ClusterProfile reconciles.
apiVersion: v1
kind: Namespace
metadata:
  name: tenants
