# Sveltos delivery — reconciles ClusterProfile CRs from the top-level
# platform/sveltos/clusterprofiles/ tree. Each profile carries a Helm chart
# (or inline manifests) + a selector. Sveltos matches selectors against
# registered SveltosClusters and applies.
#
# Targets:
#   mgmt    — the bare-metal cluster (auto-registered)
#   tenant  — registered via CAPI integration once tenants/arrakis/ is applied
#   vcluster — registered via bundled sveltos-applier (agent pull mode)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sveltos-fanout
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: homelab
  path: ./platform/sveltos/clusterprofiles
  prune: true
  wait: false   # profile-level dependsOn handles internal ordering
  timeout: 5m
  dependsOn:
    - name: platform
