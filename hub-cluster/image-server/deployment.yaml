apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-server
  namespace: image-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-server
  template:
    metadata:
      labels:
        app: image-server
    spec:
      nodeSelector:
        topology.homelab.dev/chassis: supermicro
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: images
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
      volumes:
        - name: images
          hostPath:
            path: /opt/homelab/images
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: image-server
  namespace: image-server
spec:
  type: ClusterIP
  selector:
    app: image-server
  ports:
    - port: 80
      targetPort: 80
