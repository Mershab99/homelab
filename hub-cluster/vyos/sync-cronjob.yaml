apiVersion: batch/v1
kind: CronJob
metadata:
  name: vyos-config-sync
  namespace: kube-system
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            topology.homelab.dev/chassis: supermicro
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          restartPolicy: OnFailure
          containers:
            - name: vyos-sync
              image: python:3.11-slim
              command:
                - python3
                - -c
                - |
                  import json
                  import os
                  import urllib.request
                  import ssl

                  VYOS_HOST = os.environ["VYOS_HOST"]
                  VYOS_KEY = os.environ["VYOS_API_KEY"]

                  with open("/config/config.boot") as f:
                      config_data = f.read()

                  # Push config to VyOS HTTP API
                  ctx = ssl.create_default_context()
                  ctx.check_hostname = False
                  ctx.verify_mode = ssl.CERT_NONE

                  payload = json.dumps({
                      "op": "set",
                      "path": [],
                      "value": config_data
                  }).encode()

                  req = urllib.request.Request(
                      f"https://{VYOS_HOST}/configure",
                      data=payload,
                      headers={
                          "Content-Type": "application/json",
                          "Authorization": f"Bearer {VYOS_KEY}"
                      }
                  )
                  resp = urllib.request.urlopen(req, context=ctx)
                  print(f"VyOS API response: {resp.status} {resp.read().decode()}")
              env:
                - name: VYOS_HOST
                  valueFrom:
                    secretKeyRef:
                      name: vyos-api-credentials
                      key: host
                - name: VYOS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vyos-api-credentials
                      key: api-key
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: vyos-config
---
apiVersion: v1
kind: Secret
metadata:
  name: vyos-api-credentials
  namespace: kube-system
  # SOPS: encrypt before commit
type: Opaque
stringData:
  host: "192.168.1.1"  # VyOS management IP
  api-key: <CHANGE-ME>
