apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: virt-ip-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.200-192.168.1.210    # adjust to your LAN range
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - virt-ip-pool
