apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: hub-infrastructure
spec:
  dependsOn:
    - hub-certmanager
  clusterSelector:
    matchLabels:
      cluster-type: hub
  helmCharts:
    - repositoryURL: https://kubernetes-sigs.github.io/cluster-api-operator
      chartName: cluster-api-operator
      chartVersion: "0.25.x"
      releaseName: capi-operator
      releaseNamespace: capi-operator-system
      values: |
        addon:
          helm: {}
        nodeSelector:
          node-role.kubernetes.io/agent: ""

    - repositoryURL: https://metal3-io.github.io/baremetal-operator/charts
      chartName: baremetal-operator
      chartVersion: "0.12.x"
      releaseName: baremetal-operator
      releaseNamespace: baremetal-operator-system
      values: |
        nodeSelector:
          node-role.kubernetes.io/agent: ""
        ironic:
          enabled: true
          nodeSelector:
            topology.homelab.dev/chassis: supermicro

    - repositoryURL: https://clastix.github.io/charts
      chartName: kamaji
      chartVersion: "1.x"
      releaseName: kamaji
      releaseNamespace: kamaji-system
      values: |
        nodeSelector:
          node-role.kubernetes.io/agent: ""

    - repositoryURL: https://metallb.github.io/metallb
      chartName: metallb
      chartVersion: "0.15.x"
      releaseName: metallb
      releaseNamespace: metallb-system
      values: |
        nodeSelector:
          node-role.kubernetes.io/agent: ""

    - repositoryURL: https://chisel-operator.github.io/charts
      chartName: chisel-operator
      chartVersion: "0.x"
      releaseName: chisel-operator
      releaseNamespace: chisel-operator-system
      values: |
        loadBalancerClass: chisel-operator.io/chisel-operator-class
        nodeSelector:
          node-role.kubernetes.io/agent: ""

    - repositoryURL: https://charts.dexidp.io
      chartName: dex
      chartVersion: "0.22.x"
      releaseName: dex
      releaseNamespace: dex
      values: |
        nodeSelector:
          node-role.kubernetes.io/agent: ""
        config:
          issuer: https://dex.mershab.com
          storage:
            type: kubernetes
            config:
              inCluster: true
          connectors: []  # TODO: configure identity provider (GitHub, Google, LDAP, etc.)
          staticClients:
            - id: traefik-dashboard
              name: Traefik Dashboard
              secret: REPLACE_ME  # TODO: encrypt with SOPS
              redirectURIs:
                - https://traefik-hub.mershab.com/callback
                - https://traefik-workload.mershab.com/callback

    - repositoryURL: https://projectsveltos.github.io/helm-charts
      chartName: sveltos-dashboard
      chartVersion: "1.x"
      releaseName: sveltos-dashboard
      releaseNamespace: projectsveltos
      values: |
        dashboard:
          nodeSelector:
            node-role.kubernetes.io/agent: ""
          httpRoute:
            enabled: true
            parentRefs:
              - name: hub-gateway
                namespace: kube-system
            hostnames:
              - sveltos.mershab.com
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
        uiBackendManager:
          nodeSelector:
            node-role.kubernetes.io/agent: ""
