apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dashboard-resources
  namespace: projectsveltos
data:
  gateway.yaml: |
    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: workload-gateway
      namespace: traefik-system
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
    spec:
      gatewayClassName: traefik
      listeners:
        - name: traefik-dashboard-https
          hostname: traefik-workload.mershab.com
          port: 443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - name: traefik-workload-dashboard-tls
          allowedRoutes:
            namespaces:
              from: Same
  dashboard-httproute.yaml: |
    apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: traefik-dashboard
      namespace: traefik-system
    spec:
      parentRefs:
        - name: workload-gateway
      hostnames:
        - traefik-workload.mershab.com
      rules:
        - backendRefs:
            - name: traefik
              port: 9000
