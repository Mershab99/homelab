apiVersion: metal3.io/v1alpha1
kind: BareMetalHost
metadata:
  name: r830
  namespace: workload-cluster
spec:
  online: true
  bootMACAddress: "00:00:00:00:00:00"  # CHANGE-ME: R830 PXE boot NIC MAC
  bootMode: UEFI
  bmc:
    address: ipmi://10.0.10.12  # CHANGE-ME: R830 iDRAC BMC address on VLAN 10
    credentialsName: r830-bmc-credentials
  image:
    url: http://image-server.image-server.svc.cluster.local/ubuntu-20.04.raw
    checksum: http://image-server.image-server.svc.cluster.local/ubuntu-20.04.raw.md5sum
    checksumType: md5
    format: raw
  rootDeviceHints:
    rotational: true  # Prefer spinning disk (adjust for your hardware)
---
apiVersion: v1
kind: Secret
metadata:
  name: r830-bmc-credentials
  namespace: workload-cluster
  # SOPS: encrypt before commit
type: Opaque
stringData:
  username: <CHANGE-ME>  # iDRAC username
  password: <CHANGE-ME>  # iDRAC password
