name: Build Image Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Taskfile.yaml'
      - 'images/**'
      - '.github/workflows/build-images.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/image-server
  VYOS_BRANCH: sagitta
  UBUNTU_VERSION: "20.04"
  UBUNTU_IMAGE_URL: https://cloud-images.ubuntu.com/focal/current/focal-server-cloudimg-amd64.img
  IPA_BASE_URL: https://tarballs.opendev.org/openstack/ironic-python-agent/dib/files
  IPA_BRANCH: stable-2024.1
  EXTRA_PACKAGES: qemu-guest-agent,cloud-init,cloud-utils,open-iscsi,multipath-tools,nfs-common

jobs:
  build-vyos-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone vyos-build
        run: |
          git clone -b ${{ env.VYOS_BRANCH }} --single-branch \
            https://github.com/vyos/vyos-build.git /tmp/vyos-build

      - name: Pull VyOS build container
        run: docker pull vyos/vyos-build:${{ env.VYOS_BRANCH }}

      - name: Build VyOS ISO
        run: |
          docker run --rm --privileged \
            -v /tmp/vyos-build:/vyos \
            -w /vyos \
            vyos/vyos-build:${{ env.VYOS_BRANCH }} \
            sudo ./build-vyos-image iso \
              --architecture amd64 \
              --build-by "homelab-ci@github" \
              --build-comment "Homelab VyOS CI build" \
              --build-type release \
              --version "${{ env.VYOS_BRANCH }}-$(date +%Y%m%d)"

      - name: Upload VyOS ISO
        uses: actions/upload-artifact@v4
        with:
          name: vyos-iso
          path: /tmp/vyos-build/build/live-image-amd64.hybrid.iso
          retention-days: 1

  build-image-server:
    runs-on: ubuntu-latest
    needs: build-vyos-iso
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download VyOS ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: vyos-iso
          path: images/context/

      - name: Rename VyOS ISO
        run: |
          mv images/context/live-image-amd64.hybrid.iso \
             images/context/vyos-${{ env.VYOS_BRANCH }}.iso

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils libguestfs-tools linux-image-generic

      - name: Download Ubuntu cloud image
        run: |
          curl -L -o /tmp/ubuntu-${{ env.UBUNTU_VERSION }}.qcow2 \
            ${{ env.UBUNTU_IMAGE_URL }}

      - name: Customize Ubuntu image
        run: |
          export LIBGUESTFS_BACKEND=direct
          sudo virt-customize \
            -a /tmp/ubuntu-${{ env.UBUNTU_VERSION }}.qcow2 \
            --install ${{ env.EXTRA_PACKAGES }} \
            --run-command 'systemctl enable cloud-init cloud-init-local cloud-config cloud-final' \
            --run-command 'systemctl enable iscsid open-iscsi multipath-tools' \
            --run-command 'echo "datasource_list: [ ConfigDrive, None ]" > /etc/cloud/cloud.cfg.d/99-metal3.cfg' \
            --run-command 'sed -i "s/GRUB_TIMEOUT=.*/GRUB_TIMEOUT=5/" /etc/default/grub' \
            --run-command 'update-grub 2>/dev/null || true' \
            --run-command 'apt-get clean' \
            --truncate /etc/machine-id \
            --selinux-relabel

      - name: Convert qcow2 to raw
        run: |
          qemu-img convert -f qcow2 -O raw \
            /tmp/ubuntu-${{ env.UBUNTU_VERSION }}.qcow2 \
            images/context/ubuntu-${{ env.UBUNTU_VERSION }}.raw

      - name: Generate checksum
        run: |
          cd images/context
          md5sum ubuntu-${{ env.UBUNTU_VERSION }}.raw > ubuntu-${{ env.UBUNTU_VERSION }}.raw.md5sum

      - name: Download IPA images
        run: |
          curl -L -o images/context/ipa.kernel \
            ${{ env.IPA_BASE_URL }}/ipa-centos9-${{ env.IPA_BRANCH }}.kernel
          curl -L -o images/context/ipa.initramfs \
            ${{ env.IPA_BASE_URL }}/ipa-centos9-${{ env.IPA_BRANCH }}.initramfs

      - name: List context contents
        run: ls -lh images/context/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image-server
        uses: docker/build-push-action@v6
        with:
          context: images/
          file: images/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
