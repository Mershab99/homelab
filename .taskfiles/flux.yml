# Flux bootstrap, reconcile, diff.
# https://taskfile.dev
version: '3'

vars:
  GH_OWNER: '{{.GH_OWNER | default "mershab"}}'
  GH_REPO: '{{.GH_REPO | default "homelab"}}'
  CLUSTER_PATH: 'clusters/hub'
  EXPECTED_CONTEXT: '{{.EXPECTED_CONTEXT | default "homelab-hub"}}'

tasks:
  bootstrap:
    desc: Bootstrap Flux against the repo (one-time per cluster)
    preconditions:
      - sh: test -n "$GITHUB_TOKEN"
        msg: 'GITHUB_TOKEN required (PAT with repo + workflow scope)'
      - sh: command -v flux
        msg: 'flux CLI not installed'
    cmds:
      - flux check --pre
      - |
        flux bootstrap github \
          --owner={{.GH_OWNER}} \
          --repository={{.GH_REPO}} \
          --branch=main \
          --path={{.CLUSTER_PATH}} \
          --personal \
          --components-extra=image-reflector-controller,image-automation-controller

  reconcile:
    desc: Force-reconcile every Kustomization on the hub
    preconditions:
      - sh: '[ "$(kubectl config current-context)" = "{{.EXPECTED_CONTEXT}}" ]'
        msg: 'kubectl context must be {{.EXPECTED_CONTEXT}} (got "$(kubectl config current-context)")'
    cmds:
      - flux reconcile source git flux-system
      - flux reconcile kustomization sources
      - flux reconcile kustomization infrastructure
      - flux reconcile kustomization platform
      - flux reconcile kustomization fleet
      - flux reconcile kustomization apps

  diff:
    desc: Show what Flux would change (server-side dry-run)
    preconditions:
      - sh: '[ "$(kubectl config current-context)" = "{{.EXPECTED_CONTEXT}}" ]'
        msg: 'kubectl context must be {{.EXPECTED_CONTEXT}}'
    cmds:
      - |
        for ks in sources infrastructure platform fleet apps; do
          echo "=== $ks ==="
          flux diff kustomization "$ks" --path={{.CLUSTER_PATH}}/../$ks 2>&1 || true
          echo ""
        done

  status:
    desc: Show flux status (sources + kustomizations + helmreleases)
    cmds:
      - flux get sources all
      - flux get kustomizations
      - flux get helmreleases -A

  suspend:
    desc: 'Suspend a Kustomization or HelmRelease (KIND=ks NAME=foo or KIND=hr NAME=bar)'
    preconditions:
      - sh: test -n "$KIND"
        msg: 'KIND=ks|hr required'
      - sh: test -n "$NAME"
        msg: 'NAME=<name> required'
    cmds:
      - flux suspend "$KIND" "$NAME"

  resume:
    desc: 'Resume a Kustomization or HelmRelease (KIND=ks|hr NAME=<name>)'
    preconditions:
      - sh: test -n "$KIND"
        msg: 'KIND=ks|hr required'
      - sh: test -n "$NAME"
        msg: 'NAME=<name> required'
    cmds:
      - flux resume "$KIND" "$NAME"
