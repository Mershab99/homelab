# Bootstrap helpers.
# https://taskfile.dev
#
# Cilium is bootstrapped by bootstrap/helm/01-cilium.sh (NOT rendered into Talos
# inlineManifests) — the old `render`/`hub` ISO flow was removed.
version: '3'

vars:
  TALOS_SECRETS_DIR: '{{.ROOT_DIR}}/bootstrap/talos'

tasks:
  secrets:
    desc: Generate Talos secrets bundle and SOPS-encrypt it
    preconditions:
      - sh: command -v talosctl
        msg: 'talosctl not installed'
      - sh: command -v sops
        msg: 'sops not installed'
      - sh: test -n "$SOPS_AGE_KEY_FILE"
        msg: 'SOPS_AGE_KEY_FILE not set (export it or add to mise env)'
    cmds:
      - talosctl gen secrets -o {{.TALOS_SECRETS_DIR}}/secrets.yaml
      - sops --encrypt --in-place {{.TALOS_SECRETS_DIR}}/secrets.yaml
      - mv {{.TALOS_SECRETS_DIR}}/secrets.yaml {{.TALOS_SECRETS_DIR}}/secrets.yaml.sops
      - 'echo "Encrypted secrets at {{.TALOS_SECRETS_DIR}}/secrets.yaml.sops"'
