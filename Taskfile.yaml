# https://taskfile.dev
version: '3'

vars:
  # VyOS
  VYOS_BRANCH: sagitta                          # 1.4.x LTS (equuleus = 1.3.x)
  VYOS_BUILD_DIR: '{{.ROOT_DIR}}/.build/vyos'
  VYOS_BUILD_REPO: https://github.com/vyos/vyos-build.git
  VYOS_BUILD_TYPE: iso                          # iso or cloud-init
  VYOS_ARCH: amd64

  # Ubuntu / Metal3
  UBUNTU_VERSION: '20.04'
  UBUNTU_CODENAME: focal
  UBUNTU_IMAGE_URL: https://cloud-images.ubuntu.com/focal/current/focal-server-cloudimg-amd64.img
  UBUNTU_IMAGE_FORMAT: raw                      # raw or qcow2 — Ironic prefers raw
  IMAGES_DIR: '{{.ROOT_DIR}}/.build/images'
  IMAGE_SERVER_DIR: '{{.ROOT_DIR}}/.build/image-server'

  # IPA (Ironic Python Agent)
  IPA_BASE_URL: https://tarballs.opendev.org/openstack/ironic-python-agent/dib/files
  IPA_BRANCH: stable-2024.1                     # Match your Ironic version

  # Customization
  EXTRA_PACKAGES: qemu-guest-agent,cloud-init,cloud-utils,open-iscsi,multipath-tools,nfs-common
  SSH_PUB_KEY_FILE: '{{.HOME}}/.ssh/id_ed25519.pub'

env:
  DOCKER_BUILDKIT: '1'

tasks:

  # ──────────────────────────────────────────────
  #  Top-level targets
  # ──────────────────────────────────────────────

  default:
    desc: Show available tasks
    cmds:
      - task --list

  all:
    desc: Build everything (VyOS ISO + Ubuntu image + IPA images)
    deps:
      - vyos:iso
      - ubuntu:image
      - ipa:download

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf .build

  serve:
    desc: Start a local HTTP server to preview built images (port 8080)
    deps:
      - collect
    cmds:
      - |
        echo "Serving {{.IMAGE_SERVER_DIR}} on http://localhost:8080"
        python3 -m http.server 8080 --directory {{.IMAGE_SERVER_DIR}}

  collect:
    desc: Collect all images into the image-server directory
    deps:
      - vyos:iso
      - ubuntu:image
      - ipa:download
    cmds:
      - mkdir -p {{.IMAGE_SERVER_DIR}}
      - cp {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.{{.UBUNTU_IMAGE_FORMAT}} {{.IMAGE_SERVER_DIR}}/
      - cp {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.{{.UBUNTU_IMAGE_FORMAT}}.md5sum {{.IMAGE_SERVER_DIR}}/
      - cp {{.IMAGES_DIR}}/ipa.kernel {{.IMAGE_SERVER_DIR}}/
      - cp {{.IMAGES_DIR}}/ipa.initramfs {{.IMAGE_SERVER_DIR}}/
      - cp {{.VYOS_BUILD_DIR}}/build/live-image-{{.VYOS_ARCH}}.hybrid.iso {{.IMAGE_SERVER_DIR}}/vyos-{{.VYOS_BRANCH}}.iso 2>/dev/null || true
      - |
        echo ""
        echo "=== Image Server Contents ==="
        ls -lh {{.IMAGE_SERVER_DIR}}/

  # ──────────────────────────────────────────────
  #  VyOS ISO Build
  # ──────────────────────────────────────────────

  vyos:iso:
    desc: Build VyOS ISO from source using Docker
    deps:
      - vyos:clone
      - vyos:docker-image
    cmds:
      - |
        cd {{.VYOS_BUILD_DIR}}
        docker run --rm --privileged \
          -v {{.VYOS_BUILD_DIR}}:/vyos \
          -w /vyos \
          vyos/vyos-build:{{.VYOS_BRANCH}} \
          sudo ./build-vyos-image {{.VYOS_BUILD_TYPE}} \
            --architecture {{.VYOS_ARCH}} \
            --build-by "homelab@local" \
            --build-comment "Homelab VyOS build" \
            --version "{{.VYOS_BRANCH}}-$(date +%Y%m%d)"
      - |
        ISO=$(ls {{.VYOS_BUILD_DIR}}/build/live-image-*.hybrid.iso 2>/dev/null | head -1)
        if [ -n "$ISO" ]; then
          echo ""
          echo "=== VyOS ISO Built ==="
          ls -lh "$ISO"
          md5sum "$ISO"
        else
          echo "ERROR: ISO not found in build output"
          exit 1
        fi
    status:
      - test -f {{.VYOS_BUILD_DIR}}/build/live-image-{{.VYOS_ARCH}}.hybrid.iso

  vyos:clone:
    desc: Clone vyos-build repository
    cmds:
      - mkdir -p {{.VYOS_BUILD_DIR}}
      - git clone -b {{.VYOS_BRANCH}} --single-branch {{.VYOS_BUILD_REPO}} {{.VYOS_BUILD_DIR}}
    status:
      - test -d {{.VYOS_BUILD_DIR}}/.git

  vyos:docker-image:
    desc: Pull the VyOS build container image
    cmds:
      - docker pull vyos/vyos-build:{{.VYOS_BRANCH}}

  vyos:clean:
    desc: Clean VyOS build artifacts (keep clone)
    cmds:
      - rm -rf {{.VYOS_BUILD_DIR}}/build

  # ──────────────────────────────────────────────
  #  Ubuntu 20.04 Cloud Image for Metal3
  # ──────────────────────────────────────────────

  ubuntu:image:
    desc: Download, customize, and convert Ubuntu cloud image for Metal3/Ironic
    deps:
      - ubuntu:download
      - ubuntu:customize
      - ubuntu:convert
      - ubuntu:checksum
    cmds:
      - |
        echo ""
        echo "=== Ubuntu {{.UBUNTU_VERSION}} Image Ready ==="
        ls -lh {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.*

  ubuntu:download:
    desc: Download Ubuntu cloud image
    cmds:
      - mkdir -p {{.IMAGES_DIR}}
      - curl -L -o {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.qcow2 {{.UBUNTU_IMAGE_URL}}
      - qemu-img info {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.qcow2
    status:
      - test -f {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.qcow2

  ubuntu:customize:
    desc: Customize Ubuntu image with virt-customize (packages, SSH key, Metal3 prep)
    deps:
      - ubuntu:download
    vars:
      SSH_KEY:
        sh: cat {{.SSH_PUB_KEY_FILE}} 2>/dev/null || echo ""
    preconditions:
      - sh: command -v virt-customize
        msg: |
          virt-customize not found. Install libguestfs-tools:
            sudo apt-get install -y libguestfs-tools
    cmds:
      - |
        virt-customize \
          -a {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.qcow2 \
          --install {{.EXTRA_PACKAGES}} \
          --run-command 'systemctl enable cloud-init cloud-init-local cloud-config cloud-final' \
          --run-command 'systemctl enable iscsid open-iscsi multipath-tools' \
          --run-command 'echo "datasource_list: [ ConfigDrive, None ]" > /etc/cloud/cloud.cfg.d/99-metal3.cfg' \
          --run-command 'sed -i "s/GRUB_TIMEOUT=.*/GRUB_TIMEOUT=5/" /etc/default/grub' \
          --run-command 'update-grub 2>/dev/null || true' \
          --run-command 'apt-get clean' \
          {{if .SSH_KEY}}--ssh-inject root:string:"{{.SSH_KEY}}"{{end}} \
          --truncate /etc/machine-id \
          --selinux-relabel
      - echo "Image customized successfully"
    sources:
      - '{{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.qcow2'

  ubuntu:convert:
    desc: Convert qcow2 to raw format for Ironic direct deploy
    deps:
      - ubuntu:customize
    cmds:
      - |
        if [ "{{.UBUNTU_IMAGE_FORMAT}}" = "raw" ]; then
          echo "Converting qcow2 → raw..."
          qemu-img convert -f qcow2 -O raw \
            {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.qcow2 \
            {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.raw
          echo "Raw image created"
          ls -lh {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.raw
        else
          echo "Skipping conversion — target format is qcow2"
        fi
    status:
      - |
        if [ "{{.UBUNTU_IMAGE_FORMAT}}" = "raw" ]; then
          test -f {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.raw
        else
          test -f {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.qcow2
        fi

  ubuntu:checksum:
    desc: Generate MD5 checksum for the OS image (required by Ironic)
    deps:
      - ubuntu:convert
    cmds:
      - |
        cd {{.IMAGES_DIR}}
        md5sum ubuntu-{{.UBUNTU_VERSION}}.{{.UBUNTU_IMAGE_FORMAT}} > ubuntu-{{.UBUNTU_VERSION}}.{{.UBUNTU_IMAGE_FORMAT}}.md5sum
        cat ubuntu-{{.UBUNTU_VERSION}}.{{.UBUNTU_IMAGE_FORMAT}}.md5sum

  ubuntu:clean:
    desc: Remove downloaded and built Ubuntu images
    cmds:
      - rm -f {{.IMAGES_DIR}}/ubuntu-{{.UBUNTU_VERSION}}.*

  # ──────────────────────────────────────────────
  #  IPA (Ironic Python Agent) Images
  # ──────────────────────────────────────────────

  ipa:download:
    desc: Download Ironic Python Agent kernel and initramfs
    cmds:
      - mkdir -p {{.IMAGES_DIR}}
      - curl -L -o {{.IMAGES_DIR}}/ipa.kernel {{.IPA_BASE_URL}}/ipa-centos9-{{.IPA_BRANCH}}.kernel
      - curl -L -o {{.IMAGES_DIR}}/ipa.initramfs {{.IPA_BASE_URL}}/ipa-centos9-{{.IPA_BRANCH}}.initramfs
      - |
        echo ""
        echo "=== IPA Images Downloaded ==="
        ls -lh {{.IMAGES_DIR}}/ipa.*
    status:
      - test -f {{.IMAGES_DIR}}/ipa.kernel
      - test -f {{.IMAGES_DIR}}/ipa.initramfs

  ipa:clean:
    desc: Remove IPA images
    cmds:
      - rm -f {{.IMAGES_DIR}}/ipa.*

  # ──────────────────────────────────────────────
  #  Utilities
  # ──────────────────────────────────────────────

  deps:check:
    desc: Verify all required tools are installed
    cmds:
      - |
        MISSING=""
        for cmd in docker git curl qemu-img virt-customize md5sum python3; do
          if ! command -v "$cmd" &>/dev/null; then
            MISSING="$MISSING $cmd"
          else
            printf "  %-20s %s\n" "$cmd" "$(command -v $cmd)"
          fi
        done
        if [ -n "$MISSING" ]; then
          echo ""
          echo "Missing tools:$MISSING"
          echo ""
          echo "Install with:"
          echo "  sudo apt-get install -y docker.io git curl qemu-utils libguestfs-tools"
          exit 1
        fi
        echo ""
        echo "All dependencies available."

  deps:install:
    desc: Install required dependencies (Ubuntu/Debian)
    cmds:
      - sudo apt-get update
      - sudo apt-get install -y docker.io git curl qemu-utils libguestfs-tools
      - |
        if ! groups | grep -q docker; then
          sudo usermod -aG docker $USER
          echo "Added $USER to docker group — log out and back in to take effect"
        fi
