# Local `lan` NAD in the home-assistant namespace — HA pods annotate
# `k8s.v1.cni.cncf.io/networks: lan` to attach a macvlan LAN NIC (device
# control: mDNS / Matter / Zigbee-Zwave). Flat namespace on arrakis (NADs are
# namespace-scoped, so it lives here next to HA).
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan
  namespace: home-assistant
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "lan",
      "type": "macvlan",
      "master": "br-multus",
      "mode": "bridge",
      "ipam": {
        "type": "dhcp"
      }
    }
