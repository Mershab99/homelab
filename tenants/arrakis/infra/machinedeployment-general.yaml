# general pool MachineDeployment — autoscaled by cluster-autoscaler (CAPI
# provider, delivered by the `tenant-baseline` ClusterProfile).
#
# Annotations are the autoscaler's contract — CAS reads min/max from them
# and patches spec.replicas based on tenant-side pending pods.
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: arrakis-general
  namespace: tenants
  annotations:
    cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "1"
    cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "5"
spec:
  clusterName: arrakis
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/deployment-name: arrakis-general
  template:
    metadata:
      labels:
        cluster.x-k8s.io/deployment-name: arrakis-general
        node.mershab.com/pool: general
    spec:
      clusterName: arrakis
      version: v1.36.2
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
          kind: K0sWorkerConfigTemplate
          name: arrakis-general
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: arrakis-general
