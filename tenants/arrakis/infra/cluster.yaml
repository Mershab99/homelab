# CAPI Cluster CR + KubevirtCluster + K0smotronControlPlane for the `arrakis`
# tenant. Lives in `tenants` namespace (matches working convention).
#
# Labels are load-bearing — they're what Sveltos selectors on the tenant
# ClusterProfiles match against. The tenant cluster auto-registers with
# Sveltos via CAPI integration; the labels here propagate to the resulting
# SveltosCluster.
#
# OIDC: tenant kube-apiserver federates to Dex at auth.mershab.com using
# the shared `kubernetes` OAuth2 client (bare-metal apiserver is the OIDC
# exception — see docs/architecture.md).
#
# Networking: pods 10.243.0.0/16 (distinct from bare-metal's 10.244.0.0/16),
# services 10.96.0.0/16. KubeVirt masquerade isolates the tenant network
# from bare-metal's matching service CIDR.
#
# Single-cluster setup: KubevirtCluster has no infraClusterSecretRef, so
# CAPK provisions VMs on the SAME cluster CAPI runs on. If/when we ever
# split mgmt and infra, add a Secret with the infra cluster's kubeconfig.
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: arrakis
  namespace: tenants
  labels:
    sveltos.projectsveltos.io/type: tenant
    tier: workload
    # Capability labels — ClusterProfile selectors match these.
    needs.tls: "true"
    needs.dns: "true"          # runs its own external-dns; per-cluster txt prefix keeps it off mgmt's records
    needs.multus: "true"
    needs.kubevirt-csi: "true"
    needs.gpu: "false"        # minimal: GPU stack off
    needs.autoscaler: "false" # minimal: autoscaler off; general pool fixed
    oidc.enabled: "true"
spec:
  clusterNetwork:
    pods:
      cidrBlocks: [10.243.0.0/16]
    services:
      cidrBlocks: [10.96.0.0/16]
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta2
    kind: K0smotronControlPlane
    name: arrakis
    namespace: tenants
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    name: arrakis
    namespace: tenants
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: arrakis
  namespace: tenants
  annotations:
    # Externally-managed control plane: CAPK must NOT create a CP load
    # balancer — k0smotron sets spec.controlPlaneEndpoint here itself.
    #
    # KNOWN BUG (k0smotron v2.0.3): with this annotation k0smotron is also
    # responsible for the infra ready status, but it patches the v1beta2
    # shape (status.initialization.provisioned) onto CAPK's v1alpha1 API,
    # where the field doesn't exist and gets pruned — status.ready stays
    # false and machines never provision. Until k0smotron fixes the version
    # switch (or CAPK ships a real v1beta2 API), set it once by hand after
    # any recreation of this object:
    #   kubectl patch kubevirtcluster arrakis -n tenants \
    #     --subresource=status --type=merge -p '{"status":{"ready":true}}'
    cluster.x-k8s.io/managed-by: k0smotron
spec: {}
# Day-1 single-cluster setup — CAPK uses the local cluster as infra.
# When mgmt and infra ever split, add:
#   infraClusterSecretRef:
#     apiVersion: v1
#     kind: Secret
#     name: infra-cluster-kubeconfig
#     namespace: capi-system
---
# Hosted control plane: k0smotron runs k0s controller pods (apiserver etc.)
# on mgmt, plus a managed etcd statefulset (kmc-arrakis-etcd, PVC on
# longhorn). Resources are named kmc-arrakis in this namespace.
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: K0smotronControlPlane
metadata:
  name: arrakis
  namespace: tenants
spec:
  # k0s v1.36.2 → tenant k8s 1.36.2. Image tag form uses '-k0s.'; workers
  # (K0sWorkerConfigTemplates) use the '+k0s.' form of the same release.
  version: v1.36.2-k0s.0
  replicas: 1   # bump to 3 once R820 lands
  # ClusterIP — the tenant apiserver is fronted by Traefik, not exposed as
  # its own LB (chisel-operator here is class-filtered). A Traefik
  # IngressRouteTCP (TLS passthrough, HostSNI k8s-home.mershab.com) reuses
  # the single chisel edge — see apiserver-ingressroutetcp.yaml. external-dns
  # for the FQDN lives on the Traefik Service (02-ingress-external).
  #
  # externalAddress must be set explicitly for ClusterIP (k0smotron only
  # auto-detects it for LB/NodePort services and blocks without it). The CP
  # service's cluster DNS name keeps node↔CP traffic on the local network —
  # worker VMs sit on the mgmt pod network (masquerade) so they resolve and
  # reach ClusterIP services directly.
  externalAddress: kmc-arrakis.tenants.svc.cluster.local
  service:
    type: ClusterIP
    apiPort: 6443
    konnectivityPort: 8132
  # CP pod data dir is disposable — cluster CA/SA keys live in CAPI secrets
  # (arrakis-ca etc.) and state lives in etcd, which gets its own PVC.
  persistence:
    type: emptyDir
  storage:
    type: etcd
    etcd:
      persistence:
        storageClass: longhorn   # explicit (also the cluster default)
        size: 4Gi
  k0sConfig:
    apiVersion: k0s.k0sproject.io/v1beta1
    kind: ClusterConfig
    spec:
      api:
        # Extra SAN so the apiserver cert is valid for the FQDN under TLS
        # passthrough. k0smotron appends its own service SANs automatically.
        sans:
          - k8s-home.mershab.com
        extraArgs:
          oidc-issuer-url: https://auth.mershab.com
          oidc-client-id: kubernetes
          oidc-username-claim: email
          oidc-username-prefix: "oidc:"
          oidc-groups-claim: groups
          oidc-groups-prefix: "oidc:"
      network:
        # custom = no bundled CNI (kube-router/calico) — Sveltos delivers
        # Cilium (11-tenant-cilium.yaml, kubeProxyReplacement: false).
        provider: custom
        podCIDR: 10.243.0.0/16
        serviceCIDR: 10.96.0.0/16
        kubeProxy:
          disabled: false   # Cilium runs as pure CNI; kube-proxy stays
