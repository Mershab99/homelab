# K80 pool — fixed 1 replica. Both K80 dies passed through to this single
# VM (gpus[0]+gpus[1] in the KubevirtMachineTemplate).
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: arrakis-gpu-k80
  namespace: tenants
spec:
  clusterName: arrakis
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/deployment-name: arrakis-gpu-k80
  template:
    metadata:
      labels:
        cluster.x-k8s.io/deployment-name: arrakis-gpu-k80
        node.mershab.com/pool: gpu-k80
        nvidia.com/gpu: k80
    spec:
      clusterName: arrakis
      version: v1.35.0
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: arrakis-gpu-k80
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: arrakis-gpu-k80
