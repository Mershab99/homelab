# Bootstrap config for the general pool (k0s worker).
#
# Cloud-init at first boot:
#   - bump inotify limits (many small workloads spike watches)
#   - format /dev/vdb (the 50Gi emptyDisk) as ext4, mount at /var/lib/k0s
#     — k0s keeps EVERYTHING (embedded containerd, kubelet state) under its
#     data dir, so one mount replaces the old kubeadm-era containerd/kubelet
#     relocation dance.
#
# Node labels ride the `k0s worker --labels` flag. No GPU driver install
# here — plain CPU workers.
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: K0sWorkerConfigTemplate
metadata:
  name: arrakis-general
  namespace: tenants
spec:
  template:
    spec:
      # Must match the control plane's k0s release (cluster.yaml) — note the
      # '+k0s.' form here vs '-k0s.' on the KCP (image-tag restriction).
      version: v1.36.2+k0s.0
      args:
        - --labels=node.mershab.com/pool=general
      preK0sCommands:
        # inotify limits — many small pods saturate the default.
        - echo "fs.inotify.max_user_watches=2048576" >> /etc/sysctl.conf
        - echo "fs.inotify.max_user_instances=1024" >> /etc/sysctl.conf
        - sysctl -p

        # Format + mount the 50Gi emptyDisk as k0s's data dir so the root
        # containerDisk stays lean.
        - mkfs.ext4 -F /dev/vdb
        - mkdir -p /var/lib/k0s
        - echo '/dev/vdb /var/lib/k0s ext4 defaults 0 0' >> /etc/fstab
        - mount -a
