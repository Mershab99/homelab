# Single MHC for the whole tenant. Replaces any worker that goes NotReady
# for >5 min. maxUnhealthy 50% prevents replacement storms when more than
# half the workers are sick (almost always a host-side issue).
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: arrakis
  namespace: tenants
spec:
  clusterName: arrakis
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: arrakis
  unhealthyConditions:
    - type: Ready
      status: Unknown
      timeout: 300s
    - type: Ready
      status: "False"
      timeout: 300s
  maxUnhealthy: 50%
