# Bootstrap config for the K80 pool.
#
# Identical to general (same disk relocation + sysctl tweaks) except for
# node labels. Driver install is the GPU operator's job, not cloud-init's
# — see the `tenant-gpu` ClusterProfile with its NVIDIADriver CR pinned to
# 470.141.10.
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: arrakis-gpu-k80
  namespace: tenants
spec:
  template:
    spec:
      preKubeadmCommands:
        - echo "fs.inotify.max_user_watches=2048576" >> /etc/sysctl.conf
        - echo "fs.inotify.max_user_instances=1024" >> /etc/sysctl.conf
        - sysctl -p

        - mkfs.ext4 -F /dev/vdb
        - mkdir -p /opt/vdb
        - echo '/dev/vdb /opt/vdb ext4 defaults 0 0' >> /etc/fstab
        - mount -a

        - mkdir -p /opt/vdb/kubelet
        - mkdir -p /opt/vdb/containerd/lib
        - mkdir -p /opt/vdb/containerd/state
        - sed -i '/^\[plugins\]/i root = "/opt/vdb/containerd/lib"\nstate = "/opt/vdb/containerd/state"' /etc/containerd/config.toml
        - systemctl restart containerd
      initConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            root-dir: "/opt/vdb/kubelet"
            node-labels: node.mershab.com/pool=gpu-k80,nvidia.com/gpu=k80
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            root-dir: "/opt/vdb/kubelet"
            node-labels: node.mershab.com/pool=gpu-k80,nvidia.com/gpu=k80
