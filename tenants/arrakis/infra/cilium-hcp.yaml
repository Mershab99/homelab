# Cilium delivered to the tenant cluster via CAPI's helm addon provider
# (HelmChartProxy CR). The provider is enabled in capi-operator's values
# (see platform/sveltos/clusterprofiles/05-capi-stack.yaml).
#
# CAPI's helm addon is the right tool for tenant CNI specifically: it knows
# how to wait for the tenant cluster's apiserver to be reachable before
# installing, which is the chicken-and-egg challenge (without a CNI, no
# pod schedules — including Sveltos's applier).
#
# Sveltos handles everything else on tenant (kubevirt-csi, cluster-autoscaler,
# GPU operator, OIDC RBAC, etc.) — those can wait for tenant nodes to be Ready
# before applying.
#
# Selector: cluster CRs labeled cniChart=cilium (set on arrakis Cluster CR).
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: cilium-tenant-cni
  namespace: tenants
spec:
  clusterSelector:
    matchLabels:
      cniChart: cilium
  repoURL: https://helm.cilium.io
  chartName: cilium
  releaseName: cilium
  namespace: kube-system   # release target ns (this CAAH v1alpha1 has no releaseNamespace field)
  version: 1.17.0
  valuesTemplate: |
    # Tenant has its own kube-proxy (Kamaji's kubeProxy addon installs it).
    # Run Cilium as pure CNI — no KPR.
    kubeProxyReplacement: false
    ipam:
      mode: kubernetes
    ipv4:
      enabled: true
    ipv6:
      enabled: false
    routingMode: tunnel
    tunnelProtocol: vxlan
    cni:
      exclusive: false   # Multus chains over Cilium on the tenant cluster
    hubble:
      enabled: false     # tenant observability profile flips this on later
    operator:
      replicas: 1
