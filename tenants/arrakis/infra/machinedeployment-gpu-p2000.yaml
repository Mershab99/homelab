# P2000 pool — fixed 1 replica.
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: arrakis-gpu-p2000
  namespace: tenants
spec:
  clusterName: arrakis
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/deployment-name: arrakis-gpu-p2000
  template:
    metadata:
      labels:
        cluster.x-k8s.io/deployment-name: arrakis-gpu-p2000
        node.mershab.com/pool: gpu-p2000
        nvidia.com/gpu: p2000
    spec:
      clusterName: arrakis
      version: v1.35.0
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: arrakis-gpu-p2000
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: arrakis-gpu-p2000
