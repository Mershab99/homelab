# LoadBalancer so the site gets a stable LAN IP on arrakis (Cilium LB-IPAM),
# reachable from the mgmt Traefik edge. In k3k shared mode this Service is
# reflected onto arrakis; its assigned LAN IP is what the mgmt-side HTTPRoute
# backend targets — see platform/sveltos/manifests/gateway/httproutes.yaml
# (the mershab.com route) and D3 in the plan.
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: website
spec:
  type: LoadBalancer
  selector: {app: website}
  ports:
    - {name: http, port: 80, targetPort: 80}
