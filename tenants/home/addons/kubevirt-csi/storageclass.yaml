# Tenant StorageClass — `kubevirt` — backed by the bare-metal `longhorn`
# StorageClass. PVCs that request this class get a KubeVirt DataVolume that
# wraps a Longhorn volume on bare-metal.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: kubevirt
provisioner: csi.kubevirt.io
parameters:
  infraStorageClassName: longhorn
  bus: scsi
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
allowVolumeExpansion: true
