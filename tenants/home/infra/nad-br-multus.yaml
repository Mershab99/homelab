# Bare-metal NetworkAttachmentDefinition referenced by every
# KubevirtMachineTemplate. Macvlan over the host's br0 bridge with DHCP
# IPAM (Bell Hub gives each VM a LAN IP automatically).
#
# Name `br-multus` matches working convention. Lives in the `tenants`
# namespace alongside the KubevirtMachineTemplates that reference it.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: br-multus
  namespace: tenants
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "br-multus",
      "type": "macvlan",
      "master": "br0",
      "mode": "bridge",
      "ipam": {
        "type": "dhcp"
      }
    }
