# vCluster Helm values for the `family` vCluster.
#
# Canonical copy — kept in sync with the inline values in
# platform/sveltos/clusterprofiles/12-vcluster-family.yaml (Sveltos
# helmCharts.values is inline-only, not a file ref). Edit both.
#
# The chart bundles `sveltos-applier` via experimental.deploy.vcluster.helm
# so this vCluster registers itself back to mgmt (agent pull mode) on
# startup. mgmt-side ClusterProfiles (vcluster-baseline, oidc-rbac,
# 13-app-*) then fan into it.

controlPlane:
  distro:
    k8s:
      apiServer:
        extraArgs:
          - --oidc-issuer-url=https://auth.mershab.com
          - --oidc-client-id=kubernetes
          - --oidc-username-claim=email
          - --oidc-username-prefix=oidc:
          - --oidc-groups-claim=groups
          - --oidc-groups-prefix=oidc:

integrations:
  metricsServer:
    enabled: true

experimental:
  deploy:
    vcluster:
      helm:
        - chart:
            name: sveltos-applier
            repo: https://projectsveltos.github.io/helm-charts
          release:
            name: sveltos-applier
            namespace: projectsveltos
          values: |
            managementClusterAPI: https://192.168.2.70:6443
            sveltosCluster:
              name: family
              namespace: vclusters
              labels:
                sveltos.projectsveltos.io/type: vcluster
                workload: family
                needs.lan: "true"
                oidc.enabled: "true"
