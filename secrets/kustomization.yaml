# Deploy every mgmt cluster secret at once:  kubectl apply -k secrets/
#
# Lists the FILLED *.secret.yaml files (gitignored). Fill each from its
# *.example.yaml first (see README.md). kustomize errors on a missing file, so
# comment out any you haven't filled yet. Each Secret carries its own namespace.
#
# NOT here (applied to the TENANT, not mgmt — kustomize targets one cluster):
#   - infrastructure/kubevirt-csi/infra-cluster-credentials.secret.yaml
#   - a second copy of the cloudflare token in the tenant's external-dns ns
# Apply those with KUBECONFIG pointed at arrakis.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - infrastructure/cert-manager/cloudflare-token.secret.yaml
  - infrastructure/external-dns/cloudflare-token.secret.yaml
  - infrastructure/dex/dex-config.secret.yaml
  - infrastructure/grafana/grafana-oidc.secret.yaml
  - infrastructure/minio/loki-minio.secret.yaml
  - infrastructure/chisel-operator/node-01-credentials.secret.yaml
