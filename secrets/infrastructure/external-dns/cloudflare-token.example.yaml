# TEMPLATE — copy to cloudflare-token.secret.yaml, fill the token, then
# `./secrets/apply.sh`. *.secret.yaml is gitignored (never committed).
#
# external-dns also runs on the arrakis tenant (needs.dns) — apply this same
# Secret to the tenant's external-dns ns too (KUBECONFIG=arrakis), not just mgmt.
#
# Same Cloudflare API token as cert-manager — duplicated into this namespace
# for ExternalDNS to consume directly without cross-namespace secret sharing.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
type: Opaque
stringData:
  api-token: REPLACE_WITH_CLOUDFLARE_API_TOKEN
