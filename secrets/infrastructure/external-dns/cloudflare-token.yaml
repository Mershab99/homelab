# PLAINTEXT TEMPLATE — must be SOPS-encrypted before commit.
#
#   task sops:encrypt FILE=secrets/infrastructure/external-dns/cloudflare-token.yaml
#
# Same Cloudflare API token as cert-manager — duplicated into this namespace
# for ExternalDNS to consume directly without cross-namespace secret sharing.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
type: Opaque
stringData:
  api-token: REPLACE_WITH_CLOUDFLARE_API_TOKEN
