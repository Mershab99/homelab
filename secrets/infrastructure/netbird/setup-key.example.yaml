# TEMPLATE — Netbird setup key + management URL, consumed by the Netbird k8s
# operator to enroll the tenant routing-peer into the overlay. Copy to
# setup-key.secret.yaml, fill both, then `./secrets/apply.sh` AGAINST THE TENANT
# (arrakis). *.secret.yaml is gitignored.
#
# SELF-HOSTED (decided): the setup key is generated by the self-hosted Netbird
# management server (Phase 2, 08-netbird) once it is up — create a reusable,
# non-ephemeral key in the dashboard/API and paste it here. managementURL points
# at the self-hosted control plane's public endpoint (via VPS-02 chisel), NOT
# app.netbird.io.
apiVersion: v1
kind: Secret
metadata:
  name: netbird-setup-key
  namespace: netbird
type: Opaque
stringData:
  setupKey: REPLACE_WITH_NETBIRD_SETUP_KEY
  managementURL: REPLACE_WITH_SELFHOSTED_NETBIRD_MGMT_URL   # e.g. https://netbird.mershab.com
