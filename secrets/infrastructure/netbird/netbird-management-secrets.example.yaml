# TEMPLATE — NetBird self-hosted management secrets. These MUST NOT be committed
# in the ClusterProfile's management.json (which lives in git). At execution,
# inject them into the management pod via the chart's secret mechanism
# (envFromSecret / an existing-secret ref — verify the exact key names against
# the pinned netbird chart 1.9.0) and reference them from management.json instead
# of the REPLACE_* literals in 08-netbird.yaml.
#
# Generate:
#   RELAY_SECRET=$(openssl rand -base64 32)
#   TURN_PASSWORD=$(openssl rand -base64 32)
#   DATASTORE_KEY=$(openssl rand -base64 32)   # NETBIRD_DATASTORE_ENC_KEY
#
# Copy to netbird-management-secrets.secret.yaml, fill, `./secrets/apply.sh`
# AGAINST THE TENANT. *.secret.yaml is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: netbird-management-secrets
  namespace: netbird
type: Opaque
stringData:
  NETBIRD_DATASTORE_ENC_KEY: REPLACE_WITH_DATASTORE_KEY
  NETBIRD_RELAY_AUTH_SECRET: REPLACE_WITH_RELAY_SECRET
  NETBIRD_TURN_PASSWORD: REPLACE_WITH_TURN_PASSWORD
