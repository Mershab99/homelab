# TEMPLATE — NetBird operator PAT. The operator uses this Personal Access Token
# to drive the self-hosted management API (create the network, routing peers,
# setup keys). GENERATED in the NetBird dashboard AFTER the management service is
# up (netbird.mershab.com → Settings → Personal Access Tokens / a service user).
#
# Copy to netbird-operator-token.secret.yaml, fill the token, `./secrets/apply.sh`
# AGAINST THE TENANT (arrakis), then restart the operator:
#   kubectl -n netbird rollout restart deploy/netbird-operator
# *.secret.yaml is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: netbird-operator
  namespace: netbird
type: Opaque
stringData:
  NB_API_KEY: REPLACE_WITH_NETBIRD_PAT
