# TEMPLATE — one Secret per chisel ExitNode. Copy to
# node-01-credentials.secret.yaml (match the Secret name / the ExitNode's
# spec.auth), fill the token, then `./secrets/apply.sh`. Add more nodes to
# secrets/kustomization.yaml. *.secret.yaml is gitignored.
#
# The Secret name must match the ExitNode's spec.auth field
# (clusters/baremetal/addons/chisel-operator/exit-nodes/<node>.yaml).
# On the VPS run: chisel server --auth "chisel:<TOKEN>" --port 9090 --reverse
apiVersion: v1
kind: Secret
metadata:
  name: node-01-credentials
  namespace: chisel-operator-system
type: Opaque
stringData:
  auth: REPLACE_WITH_CHISEL_AUTH_TOKEN
