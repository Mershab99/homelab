# TEMPLATE — chisel ExitNode 02 creds (the TENANT public edge, VPS-02). Copy to
# node-02-credentials.secret.yaml, fill the token, then `./secrets/apply.sh`
# AGAINST THE TENANT (arrakis) — this Secret is consumed by the tenant-side
# chisel-operator installed by 12-tenant-ingress, NOT the mgmt one.
#
# The Secret name must match the ExitNode's spec.auth
# (tenants/arrakis/ingress/exit-nodes/node-02.yaml).
# On VPS-02 run: chisel server --auth "chisel:<TOKEN>" --port 9090 --reverse
apiVersion: v1
kind: Secret
metadata:
  name: node-02-credentials
  namespace: chisel-operator-system
type: Opaque
stringData:
  auth: REPLACE_WITH_CHISEL_AUTH_TOKEN
