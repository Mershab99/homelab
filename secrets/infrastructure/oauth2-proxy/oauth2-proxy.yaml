# PLAINTEXT TEMPLATE — must be sealed/SOPS-encrypted before commit.
#
# oauth2-proxy reads these as env (OAUTH2_PROXY_* envFrom). The client secret
# MUST equal the `oauth2-proxy` staticClient secret in the Dex dex-config
# (secrets/infrastructure/dex/). The cookie secret is a fresh random 32 bytes:
#   openssl rand -base64 32 | tr -- '+/' '-_'
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
  namespace: traefik
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_SECRET: REPLACE_WITH_DEX_OAUTH2_PROXY_CLIENT_SECRET
  OAUTH2_PROXY_COOKIE_SECRET: REPLACE_WITH_RANDOM_32_BYTE_BASE64URL
