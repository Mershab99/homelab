# TEMPLATE — copy to dex-config.secret.yaml, fill the bcrypt hash + client
# secrets, then `./secrets/apply.sh`. *.secret.yaml is gitignored.
#
# Dex reads its whole runtime config from this Secret (dex chart:
# configSecret.create=false, configSecret.name=dex-config). Day-1 login is
# mershab/mershab — bcrypt it and change later. See README.md for how to
# generate the hash + per-client secrets and add an upstream IdP later.
#
#   ADMIN_BCRYPT=$(htpasswd -bnBC 10 "" mershab | tr -d ':\n')
#   K8S/GRAFANA client secret = openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: dex-config
  namespace: dex
type: Opaque
stringData:
  config.yaml: |
    issuer: https://auth.mershab.com
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
    enablePasswordDB: true
    staticPasswords:
      - email: mershab@integratrace.com
        hash: "REPLACE_WITH_BCRYPT_OF_mershab"
        username: mershab
        userID: "1"
    staticClients:
      - id: kubernetes
        name: Kubernetes
        secret: "REPLACE_WITH_K8S_CLIENT_SECRET"
        redirectURIs:
          - http://localhost:8000
          - http://localhost:18000
      - id: grafana
        name: Grafana
        secret: "REPLACE_WITH_GRAFANA_CLIENT_SECRET"
        redirectURIs:
          - https://grafana.homelab.mershab.com/login/generic_oauth
