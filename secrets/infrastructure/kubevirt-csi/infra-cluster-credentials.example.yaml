# TEMPLATE — copy to infra-cluster-credentials.secret.yaml, paste a kubeconfig
# to the mgmt (infra) cluster scoped to the `tenants` namespace, then apply it
# TO THE TENANT (arrakis) cluster. *.secret.yaml is gitignored.
#
# The kubevirt-csi controller runs on arrakis and uses this kubeconfig to create
# DataVolumes / KubeVirt volumes on mgmt. Mount path: /var/run/secrets/infracluster.
# Scope the SA to the tenants ns (create/get DataVolumes, PVCs, VMs) — don't hand
# it cluster-admin.
#
# NOTE: applied to the TENANT, not mgmt — so ./secrets/apply.sh (which targets
# mgmt) does NOT cover this one. Apply with KUBECONFIG pointed at arrakis.
apiVersion: v1
kind: Secret
metadata:
  name: infra-cluster-credentials
  namespace: kubevirt-csi-driver
type: Opaque
stringData:
  kubeconfig: |
    REPLACE_WITH_MGMT_KUBECONFIG_SCOPED_TO_tenants_NAMESPACE
