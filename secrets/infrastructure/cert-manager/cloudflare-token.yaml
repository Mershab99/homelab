# PLAINTEXT TEMPLATE — must be SOPS-encrypted before commit.
#
#   task sops:encrypt FILE=secrets/infrastructure/cert-manager/cloudflare-token.yaml
#
# Cloudflare API token scope:
#   Zone     : Zone     : Read    (on the lab.mershab.com zone)
#   Zone     : DNS      : Edit    (on the lab.mershab.com zone)
#
# Create at: https://dash.cloudflare.com/profile/api-tokens (Custom token)
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: REPLACE_WITH_CLOUDFLARE_API_TOKEN
